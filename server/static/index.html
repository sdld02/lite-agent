<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lite Agent - 控制面板</title>
<style>
:root {
  --bg: #0a0b10;
  --bg-subtle: #0e1018;
  --sidebar-bg: #0e1018;
  --surface: #13151f;
  --surface-hover: #1a1d2e;
  --surface-raised: #181b28;
  --border: rgba(255,255,255,0.06);
  --border-subtle: rgba(255,255,255,0.04);
  --border-active: rgba(108,140,255,0.4);
  --text: #eaedf6;
  --text-secondary: #9298ad;
  --text-muted: #555b73;
  --accent: #7b9fff;
  --accent-hover: #9bb5ff;
  --accent-dim: rgba(123,159,255,0.10);
  --accent-glow: rgba(123,159,255,0.25);
  --success: #34d399;
  --success-dim: rgba(52,211,153,0.10);
  --error: #f87171;
  --error-dim: rgba(248,113,113,0.10);
  --warning: #fbbf24;
  --warning-dim: rgba(251,191,36,0.10);
  --reasoning: #8b93a8;
  --tool-bg: #10121b;
  --tool-border: rgba(123,159,255,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-accent: 0 0 20px rgba(123,159,255,0.15);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; font-family:var(--font-sans); background:var(--bg); color:var(--text); overflow:hidden; -webkit-font-smoothing:antialiased; }
#app { display:flex; height:100%; }

/* ====== SIDEBAR ====== */
#sidebar {
  width:288px; min-width:288px; background:var(--sidebar-bg);
  display:flex; flex-direction:column;
  border-right:1px solid var(--border);
  position:relative;
  transition:width 0.25s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
#sidebar.collapsed {
  width:60px; min-width:60px;
}
#sidebar::after {
  content:''; position:absolute; top:0; right:0; bottom:0; width:1px;
  background:linear-gradient(180deg, var(--accent-dim) 0%, transparent 50%, var(--accent-dim) 100%);
  pointer-events:none;
}

.sidebar-header {
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header h1 { font-size:15px; font-weight:700; letter-spacing:-0.3px; white-space:nowrap; overflow:hidden; }
.sidebar-header .logo { display:flex; align-items:center; gap:10px; min-width:0; }
.sidebar-header .logo .dot {
  width:8px; height:8px; border-radius:50%;
  background:var(--success); flex-shrink:0;
  box-shadow:0 0 8px var(--success);
}
.sidebar-header .logo .dot.disconnected { background:var(--text-muted); box-shadow:none; }
.sidebar-header .logo .dot.connecting { background:var(--warning); box-shadow:0 0 8px var(--warning); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Sidebar toggle button */
.sidebar-toggle {
  background:none; border:none; color:var(--text-muted); cursor:pointer;
  padding:4px; border-radius:var(--radius-xs); transition:var(--transition);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; width:28px; height:28px;
}
.sidebar-toggle:hover { color:var(--text); background:var(--surface-hover); }
.sidebar-toggle svg { width:16px; height:16px; transition:transform 0.25s; }
#sidebar.collapsed .sidebar-toggle svg { transform:rotate(180deg); }

/* Collapsed sidebar styles */
#sidebar.collapsed .sidebar-header { padding:16px 12px; justify-content:center; }
#sidebar.collapsed .sidebar-header h1 { display:none; }
#sidebar.collapsed .status-bar { display:none; }
#sidebar.collapsed .session-actions { padding:6px 8px; }
#sidebar.collapsed .session-actions button {
  padding:10px 0; border-style:solid; font-size:16px;
  overflow:hidden; line-height:1;
}
#sidebar.collapsed .session-actions button .btn-text { display:none; }
#sidebar.collapsed #session-list { display:none; }
#sidebar.collapsed #task-panel { display:none; }
#sidebar.collapsed .sidebar-collapsed-icons { display:flex; }

/* Collapsed sidebar icon strip */
.sidebar-collapsed-icons {
  display:none; flex-direction:column; align-items:center;
  gap:4px; padding:8px 0; flex:1; overflow-y:auto;
}
.sidebar-collapsed-icon {
  width:40px; height:40px; border-radius:var(--radius-sm);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:var(--transition);
  background:transparent; border:1px solid transparent;
  color:var(--text-secondary); font-size:13px;
  position:relative;
}
.sidebar-collapsed-icon:hover { background:var(--surface-hover); color:var(--text); }
.sidebar-collapsed-icon.active { background:var(--accent-dim); border-color:var(--border-active); color:var(--accent); }
.sidebar-collapsed-icon .icon-count {
  position:absolute; top:2px; right:2px; font-size:9px;
  background:var(--accent); color:#fff; min-width:14px; height:14px;
  border-radius:7px; display:flex; align-items:center; justify-content:center;
  font-weight:700; padding:0 3px;
}
.sidebar-collapsed-icon[title]::after { content:none; }

.status-bar {
  padding:8px 18px; font-size:11px; color:var(--text-muted);
  border-bottom:1px solid var(--border-subtle);
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(0,0,0,0.15);
}
.status-bar .addr { font-family:var(--font-mono); font-size:10px; }

.session-actions { padding:10px 12px; }
.session-actions button {
  width:100%; padding:10px; border:1px dashed var(--border);
  background:var(--accent-dim); color:var(--accent);
  border-radius:var(--radius-sm); cursor:pointer;
  font-size:13px; font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:var(--transition);
}
.session-actions button:hover {
  border-color:var(--accent); background:var(--accent-glow);
  box-shadow:var(--shadow-accent);
}

#session-list { flex:1; overflow-y:auto; padding:4px 8px 8px; }
.session-item {
  padding:10px 12px; margin:2px 0; border-radius:var(--radius-sm);
  cursor:pointer; display:flex; align-items:center;
  justify-content:space-between; transition:var(--transition);
  font-size:13px; border:1px solid transparent;
  position:relative;
}
.session-item:hover { background:var(--surface-hover); }
.session-item.active {
  background:var(--accent-dim); border-color:var(--border-active);
}
.session-item.active::before {
  content:''; position:absolute; left:0; top:8px; bottom:8px;
  width:3px; border-radius:0 3px 3px 0;
  background:var(--accent);
}
.session-item .info { flex:1; min-width:0; }
.session-item .name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
.session-item .meta { font-size:11px; color:var(--text-muted); margin-top:2px; }
.session-item .delete-btn {
  opacity:0; background:none; border:none; color:var(--error);
  cursor:pointer; font-size:14px; padding:4px 6px;
  border-radius:var(--radius-xs); transition:var(--transition);
}
.session-item:hover .delete-btn { opacity:0.6; }
.session-item .delete-btn:hover { opacity:1; background:var(--error-dim); }

/* ====== MAIN ====== */
#main { flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg); }

#toolbar {
  padding:14px 24px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  background:var(--surface); flex-shrink:0;
  backdrop-filter:blur(12px);
}
#toolbar .session-title { font-weight:600; font-size:14px; letter-spacing:-0.2px; }
#toolbar .actions { display:flex; gap:6px; }
#toolbar .actions button {
  padding:7px 14px; border-radius:var(--radius-xs);
  border:1px solid var(--border); background:transparent;
  color:var(--text-secondary); cursor:pointer; font-size:12px;
  font-weight:500; transition:var(--transition);
}
#toolbar .actions button:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
#toolbar .actions button.danger:hover { border-color:var(--error); color:var(--error); background:var(--error-dim); }

/* ====== MESSAGES ====== */
#messages {
  flex:1; overflow-y:auto; padding:20px; display:flex;
  flex-direction:column; gap:14px;
  background:linear-gradient(180deg, var(--bg) 0%, var(--bg-subtle) 100%);
}

.msg { display:flex; flex-direction:column; max-width:78%; animation:msgIn 0.25s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-self:flex-end; }
.msg.assistant { align-self:flex-start; }
.msg .bubble {
  padding:10px 14px; border-radius:var(--radius); line-height:1.55;
  font-size:13px; word-break:break-word;
}
.msg.user .bubble {
  background:linear-gradient(135deg, var(--accent) 0%, #6880e8 100%);
  color:#fff; border-bottom-right-radius:4px;
  box-shadow:0 2px 12px rgba(123,159,255,0.25);
}
.msg.assistant .bubble {
  background:var(--surface-raised); border:1px solid var(--border);
  border-bottom-left-radius:4px;
  box-shadow:var(--shadow-sm);
}
.msg .bubble pre {
  background:#080910; border-radius:var(--radius-sm);
  padding:10px; overflow-x:auto; font-family:var(--font-mono);
  font-size:12px; margin:6px 0; border:1px solid var(--border);
}
.msg .bubble code { font-family:var(--font-mono); font-size:12px; background:rgba(255,255,255,0.06); padding:1px 4px; border-radius:3px; }
.msg .bubble p { margin:2px 0; }
.msg .bubble ul, .msg .bubble ol { margin:2px 0; padding-left:18px; }
.msg .bubble blockquote { border-left:2px solid var(--accent); padding-left:10px; color:var(--text-secondary); margin:6px 0; }

/* ====== REASONING ====== */
.reasoning-block {
  margin-bottom:6px; padding:8px 12px;
  background:rgba(139,147,168,0.06);
  border-left:2px solid var(--reasoning);
  border-radius:0 var(--radius-xs) var(--radius-xs) 0;
  font-size:12px; color:var(--reasoning); font-style:italic;
}
.reasoning-block summary { cursor:pointer; font-weight:600; margin-bottom:2px; font-style:normal; font-size:12px; }
.reasoning-block summary:hover { color:var(--text-secondary); }

/* ====== TOOL CARD ====== */
.tool-card {
  margin:6px 0; background:var(--tool-bg);
  border:1px solid var(--tool-border);
  border-radius:var(--radius-xs); overflow:hidden; font-size:12px;
  box-shadow:var(--shadow-sm);
  transition:var(--transition);
}
.tool-card:hover { border-color:rgba(123,159,255,0.2); }
.tool-card-header {
  padding:7px 10px; display:flex; align-items:center; gap:8px;
  cursor:pointer; background:rgba(123,159,255,0.04); user-select:none;
  transition:var(--transition);
}
.tool-card-header:hover { background:rgba(123,159,255,0.08); }
.tool-card-header .tool-icon { font-size:13px; flex-shrink:0; }
.tool-card-header .tool-info { flex:1; min-width:0; display:flex; flex-wrap:wrap; align-items:baseline; gap:0 6px; }
.tool-card-header .tool-name { font-weight:600; color:var(--accent); font-size:12px; white-space:nowrap; }
.tool-card-header .tool-intent { color:var(--text-secondary); font-size:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tool-card-header .tool-arrow { flex-shrink:0; transition:transform 0.2s; color:var(--text-muted); font-size:9px; }
.tool-card.open .tool-card-header .tool-arrow { transform:rotate(180deg); }
.tool-card-body { display:none; padding:8px 10px; }
.tool-card.open .tool-card-body { display:block; }
.tool-card-body pre {
  background:#080910; padding:8px; border-radius:var(--radius-xs);
  overflow-x:auto; font-family:var(--font-mono); font-size:11px;
  border:1px solid var(--border); max-height:250px;
}
.tool-result { margin-top:4px; }
.tool-result-label { font-size:10px; color:var(--text-muted); margin-bottom:2px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.tool-result .success { color:var(--success); font-size:11px; }
.tool-result .error { color:var(--error); font-size:11px; }

/* ====== STREAMING ====== */
.streaming-cursor::after { content:' ▌'; animation:blink 0.8s infinite; color:var(--accent); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.spinner-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
.msg.streaming .bubble { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-dim), var(--shadow-accent); }

/* ====== INPUT AREA ====== */
#input-area {
  padding:16px 24px; border-top:1px solid var(--border);
  background:var(--surface); flex-shrink:0;
}
.input-row { display:flex; gap:10px; align-items:flex-end; }
#input {
  flex:1; padding:12px 18px; border-radius:var(--radius);
  border:1px solid var(--border); background:var(--bg);
  color:var(--text); font-size:14px; font-family:var(--font-sans);
  resize:none; min-height:46px; max-height:160px;
  outline:none; transition:var(--transition); line-height:1.45;
}
#input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
#input::placeholder { color:var(--text-muted); }
#send-btn {
  padding:12px 26px; background:linear-gradient(135deg, var(--accent) 0%, #6880e8 100%);
  color:#fff; border:none; border-radius:var(--radius);
  cursor:pointer; font-size:14px; font-weight:600;
  transition:var(--transition); white-space:nowrap;
  box-shadow:0 2px 12px rgba(123,159,255,0.3);
}
#send-btn:hover { filter:brightness(1.1); box-shadow:0 4px 20px rgba(123,159,255,0.4); transform:translateY(-1px); }
#send-btn:active { transform:translateY(0); }
#send-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none; }
#stop-btn {
  padding:12px 18px; background:var(--error-dim); color:var(--error);
  border:1px solid rgba(248,113,113,0.3); border-radius:var(--radius);
  cursor:pointer; font-size:14px; font-weight:500; display:none;
  transition:var(--transition);
}
#stop-btn:hover { background:rgba(248,113,113,0.2); }

/* ====== TOAST ====== */
.toast {
  position:fixed; top:24px; right:24px;
  padding:14px 22px; border-radius:var(--radius-sm);
  font-size:13px; z-index:999; animation:toastIn 0.3s ease;
  background:var(--surface-raised); border:1px solid var(--border);
  color:var(--text); box-shadow:var(--shadow-lg);
  backdrop-filter:blur(12px);
}
@keyframes toastIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.toast.error { border-color:rgba(248,113,113,0.4); background:linear-gradient(135deg, var(--surface-raised) 0%, rgba(248,113,113,0.06) 100%); }
.toast.success { border-color:rgba(52,211,153,0.4); background:linear-gradient(135deg, var(--surface-raised) 0%, rgba(52,211,153,0.06) 100%); }

/* ====== WELCOME ====== */
.welcome {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100%; color:var(--text-muted); gap:16px;
}
.welcome .icon { font-size:56px; filter:drop-shadow(0 4px 12px rgba(123,159,255,0.3)); }
.welcome h2 { font-weight:700; font-size:20px; color:var(--text-secondary); letter-spacing:-0.3px; }
.welcome p { font-size:13px; max-width:420px; text-align:center; line-height:1.7; }
.welcome .hints { margin-top:12px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
.welcome .hint {
  padding:8px 16px; border-radius:20px;
  border:1px solid var(--border); font-size:12px;
  cursor:pointer; transition:var(--transition);
  background:var(--surface);
}
.welcome .hint:hover {
  border-color:var(--accent); color:var(--accent);
  background:var(--accent-dim); box-shadow:var(--shadow-accent);
  transform:translateY(-1px);
}

/* ====== SCROLLBAR ====== */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.15); }

.empty-state { display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:100%; color:var(--text-muted);
  gap:8px; font-size:13px; }

/* ====== MODAL ====== */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100;
  display:flex; align-items:center; justify-content:center;
  animation:fadeIn 0.2s ease; backdrop-filter:blur(8px);
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:28px; width:540px; max-width:92vw;
  box-shadow:0 24px 64px rgba(0,0,0,0.5);
}
.modal h3 { margin-bottom:20px; font-size:17px; font-weight:700; }
.modal label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:5px; margin-top:14px; font-weight:500; }
.modal input, .modal select {
  width:100%; padding:10px 14px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--bg);
  color:var(--text); font-size:14px; outline:none;
  transition:var(--transition);
}
.modal input:focus, .modal select:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.modal-buttons { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }
.modal-buttons button {
  padding:10px 22px; border-radius:var(--radius-sm); font-size:13px;
  cursor:pointer; font-weight:600; transition:var(--transition);
}
.modal-buttons .primary {
  background:linear-gradient(135deg, var(--accent) 0%, #6880e8 100%);
  color:#fff; border:none;
  box-shadow:0 2px 12px rgba(123,159,255,0.3);
}
.modal-buttons .primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
.modal-buttons .secondary {
  background:transparent; color:var(--text-secondary);
  border:1px solid var(--border);
}
.modal-buttons .secondary:hover { border-color:var(--text-muted); color:var(--text); }

/* ====== TASK PANEL ====== */
#task-panel {
  border-top:1px solid var(--border);
  max-height:35%; display:flex; flex-direction:column; min-height:0;
  background:rgba(0,0,0,0.15);
  overflow:hidden;
  transition:max-height 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
#task-panel.collapsed {
  max-height:36px;
}
.task-panel-header {
  padding:10px 16px; font-size:11px; font-weight:600;
  color:var(--text-muted); text-transform:uppercase;
  letter-spacing:0.5px; display:flex; align-items:center;
  justify-content:space-between; flex-shrink:0; cursor:pointer;
  transition:var(--transition);
}
.task-panel-header:hover { color:var(--text-secondary); }
.task-panel-header .left { display:flex; align-items:center; gap:6px; }
.task-panel-header .toggle-arrow {
  font-size:10px; transition:transform 0.25s; display:inline-block;
}
#task-panel.collapsed .task-panel-header .toggle-arrow { transform:rotate(-90deg); }
.task-panel-header .task-count {
  font-size:10px; color:var(--accent);
  background:var(--accent-dim); padding:2px 8px;
  border-radius:10px; font-weight:600;
}
#task-panel.collapsed #task-list { display:none; }
#task-list { flex:1; overflow-y:auto; padding:0 8px 8px; min-height:0; }
.task-item {
  padding:8px 12px; margin:2px 0; border-radius:var(--radius-xs);
  font-size:12px; display:flex; align-items:center; gap:8px;
  transition:var(--transition); cursor:default;
}
.task-item:hover { background:var(--surface-hover); }
.task-status-icon {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
.task-status-icon.pending { background:var(--text-muted); }
.task-status-icon.in_progress { background:var(--warning); box-shadow:0 0 6px var(--warning); animation:pulse 1.5s infinite; }
.task-status-icon.completed { background:var(--success); box-shadow:0 0 6px rgba(52,211,153,0.4); }
.task-item .task-info { flex:1; min-width:0; }
.task-item .task-subject { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text-secondary); }
.task-item.completed .task-subject { text-decoration:line-through; color:var(--text-muted); }
.task-item .task-id { font-size:10px; color:var(--text-muted); flex-shrink:0; font-family:var(--font-mono); }

@media (max-width:768px) {
  #sidebar { width:240px; min-width:240px; }
  .msg { max-width:92%; }
}

/* ====== TELEGRAM BOT ====== */
.telegram-section { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
.telegram-section .section-title { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.telegram-status { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:var(--radius-sm); font-size:12px; margin-top:8px; }
.telegram-status.running { background:var(--success-dim); color:var(--success); border:1px solid rgba(52,211,153,0.2); }
.telegram-status.stopped { background:rgba(85,91,115,0.08); color:var(--text-muted); border:1px solid var(--border); }
.telegram-status.error { background:var(--error-dim); color:var(--error); border:1px solid rgba(248,113,113,0.2); }
.telegram-status .status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.telegram-status.running .status-dot { background:var(--success); box-shadow:0 0 6px var(--success); animation:pulse 1.5s infinite; }
.telegram-status.stopped .status-dot { background:var(--text-muted); }
.telegram-status.error .status-dot { background:var(--error); }
.telegram-actions { display:flex; gap:8px; margin-top:8px; }
.telegram-actions button { padding:8px 16px; border-radius:var(--radius-xs); font-size:12px; cursor:pointer; border:1px solid var(--border); transition:var(--transition); font-weight:500; }
.telegram-actions .tg-start { background:var(--success); color:#000; border-color:var(--success); font-weight:600; }
.telegram-actions .tg-start:hover { filter:brightness(1.1); transform:translateY(-1px); box-shadow:0 2px 12px rgba(52,211,153,0.3); }
.telegram-actions .tg-stop { background:transparent; color:var(--error); border-color:rgba(248,113,113,0.3); }
.telegram-actions .tg-stop:hover { background:var(--error-dim); }
.telegram-actions .tg-start:disabled, .telegram-actions .tg-stop:disabled { opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none; }

/* ====== MCP SERVERS ====== */
.mcp-section { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
.mcp-section .section-title { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.mcp-server-list { margin-bottom:8px; }
.mcp-server-card {
  border:1px solid var(--border); border-radius:var(--radius-sm);
  margin-bottom:6px; background:var(--bg); overflow:hidden;
  transition:var(--transition);
}
.mcp-server-card:hover { border-color:rgba(255,255,255,0.1); }
.mcp-server-card .card-header {
  display:flex; align-items:center; padding:10px 14px; gap:10px; cursor:default;
}
.mcp-server-card .card-name { font-size:13px; font-weight:600; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mcp-server-card .card-cmd { font-size:11px; color:var(--text-muted); font-family:var(--font-mono); }
.mcp-server-card .card-badge {
  font-size:10px; padding:3px 8px; border-radius:10px;
  background:var(--surface); color:var(--text-muted);
  border:1px solid var(--border); white-space:nowrap; flex-shrink:0;
}
.mcp-server-card .card-actions { display:flex; gap:4px; flex-shrink:0; }
.mcp-server-card .card-actions button {
  padding:4px 10px; border-radius:var(--radius-xs); font-size:11px;
  cursor:pointer; border:1px solid var(--border);
  background:transparent; color:var(--text-secondary);
  transition:var(--transition);
}
.mcp-server-card .card-actions button:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
.mcp-server-card .card-actions .btn-delete:hover { border-color:var(--error); color:var(--error); background:var(--error-dim); }
.mcp-add-btn {
  width:100%; padding:10px; border-radius:var(--radius-sm);
  font-size:12px; cursor:pointer; border:1px dashed var(--border);
  background:transparent; color:var(--text-muted); transition:var(--transition);
}
.mcp-add-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
.mcp-hint { font-size:11px; color:var(--text-muted); margin-top:6px; line-height:1.5; }

.mcp-server-card.disabled { opacity:0.5; }
.mcp-server-card.disabled .card-name { color:var(--text-muted); text-decoration:line-through; }

/* MCP Toggle */
.mcp-toggle { display:flex; align-items:center; gap:8px; cursor:pointer; flex-shrink:0; }
.mcp-toggle input { display:none; }
.mcp-toggle .slider {
  width:34px; height:18px; border-radius:9px;
  background:var(--text-muted); position:relative;
  transition:var(--transition);
}
.mcp-toggle .slider::after {
  content:''; position:absolute; top:2px; left:2px;
  width:14px; height:14px; border-radius:50%;
  background:#fff; transition:var(--transition);
}
.mcp-toggle input:checked + .slider { background:var(--accent); box-shadow:0 0 8px var(--accent-dim); }
.mcp-toggle input:checked + .slider::after { transform:translateX(16px); }
.mcp-toggle .toggle-label { font-size:11px; color:var(--text-muted); }

/* MCP Tool List */
.mcp-tool-list { padding:0 14px 12px; border-top:1px solid var(--border-subtle); display:none; }
.mcp-tool-list.open { display:block; }
.mcp-tool-toggle {
  font-size:11px; color:var(--accent); cursor:pointer; padding:6px 0;
  display:flex; align-items:center; gap:4px; user-select:none;
  transition:var(--transition);
}
.mcp-tool-toggle:hover { color:var(--accent-hover); }
.mcp-tool-item {
  padding:6px 10px; border-radius:var(--radius-xs);
  background:var(--surface); margin-bottom:4px;
  font-size:11px; color:var(--text-secondary);
  border:1px solid var(--border-subtle);
}
.mcp-tool-item .tool-name { font-weight:600; color:var(--text); }
.mcp-tool-item .tool-desc { color:var(--text-muted); margin-top:2px; }
.mcp-tool-empty { font-size:11px; color:var(--text-muted); padding:4px 0; }

/* MCP Modal */
.mcp-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200;
  display:flex; align-items:center; justify-content:center;
  animation:fadeIn 0.2s ease; backdrop-filter:blur(8px);
}
.mcp-modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:28px; width:540px;
  max-width:94vw; max-height:88vh; overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,0.5);
}
.mcp-modal h3 { margin-bottom:18px; font-size:17px; font-weight:700; }
.mcp-modal label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:5px; margin-top:14px; font-weight:500; }
.mcp-modal input, .mcp-modal textarea {
  width:100%; padding:10px 14px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--bg);
  color:var(--text); font-size:13px; font-family:var(--font-mono);
  outline:none; box-sizing:border-box; transition:var(--transition);
}
.mcp-modal input:focus, .mcp-modal textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-dim); }
.mcp-modal textarea { resize:vertical; min-height:72px; line-height:1.5; }
.env-kv-list { margin-bottom:4px; }
.env-kv-row { display:flex; gap:6px; margin-bottom:6px; align-items:center; }
.env-kv-row input { flex:1; }
.env-kv-row .kv-sep { color:var(--text-muted); font-size:12px; flex-shrink:0; }
.env-kv-row .btn-del-env {
  padding:6px 10px; border-radius:var(--radius-xs); font-size:11px;
  cursor:pointer; border:1px solid var(--border);
  background:transparent; color:var(--text-muted);
  flex-shrink:0; transition:var(--transition);
}
.env-kv-row .btn-del-env:hover { border-color:var(--error); color:var(--error); background:var(--error-dim); }
.btn-add-env {
  padding:6px 14px; border-radius:var(--radius-xs); font-size:11px;
  cursor:pointer; border:1px dashed var(--border);
  background:transparent; color:var(--text-muted);
  transition:var(--transition);
}
.btn-add-env:hover { border-color:var(--accent); color:var(--accent); }

/* ====== ASK USER QUESTION ====== */
.question-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200;
  display:flex; align-items:center; justify-content:center;
  animation:fadeIn 0.2s ease; backdrop-filter:blur(8px);
}
.question-modal {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:32px 36px; width:580px;
  max-width:92vw; max-height:85vh; overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,0.6);
}
.question-modal h2 {
  font-size:20px; font-weight:700; margin-bottom:6px;
  display:flex; align-items:center; gap:10px;
  letter-spacing:-0.3px;
}
.question-modal h2 .q-icon { font-size:24px; }
.question-modal .q-subtitle { font-size:12px; color:var(--text-muted); margin-bottom:10px; }
.question-modal .q-progress { display:flex; gap:6px; margin-bottom:22px; flex-wrap:wrap; }
.question-modal .q-progress-dot {
  width:10px; height:10px; border-radius:50%;
  background:rgba(255,255,255,0.06); border:1px solid var(--border);
  transition:var(--transition); cursor:pointer;
}
.question-modal .q-progress-dot.active { background:var(--accent); border-color:var(--accent); transform:scale(1.3); box-shadow:0 0 8px var(--accent-dim); }
.question-modal .q-progress-dot.answered { background:var(--success); border-color:var(--success); }

.q-block { margin-bottom:24px; animation:msgIn 0.25s ease; }
.q-block .q-header {
  display:inline-block; padding:4px 12px; border-radius:12px;
  background:var(--accent-dim); color:var(--accent);
  font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.5px; margin-bottom:10px;
}
.q-block .q-text { font-size:15px; font-weight:500; margin-bottom:16px; line-height:1.55; color:var(--text); }
.q-block .q-type-hint { font-size:11px; color:var(--text-muted); margin-bottom:10px; }

.option-card {
  display:flex; align-items:flex-start; gap:12px;
  padding:14px 16px; margin-bottom:8px; border-radius:var(--radius);
  border:1px solid var(--border); cursor:pointer;
  transition:var(--transition); background:var(--bg);
}
.option-card:hover { border-color:var(--accent); background:var(--accent-dim); }
.option-card.selected {
  border-color:var(--accent); background:rgba(123,159,255,0.12);
  box-shadow:0 0 0 1px var(--accent), var(--shadow-accent);
}
.option-card .opt-radio {
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--border); flex-shrink:0; margin-top:1px;
  transition:var(--transition); display:flex;
  align-items:center; justify-content:center;
}
.option-card.selected .opt-radio { border-color:var(--accent); background:var(--accent); box-shadow:0 0 8px var(--accent-dim); }
.option-card.selected .opt-radio::after { content:''; width:6px; height:6px; border-radius:50%; background:#fff; }
.option-card .opt-check {
  width:20px; height:20px; border-radius:4px;
  border:2px solid var(--border); flex-shrink:0; margin-top:1px;
  transition:var(--transition); display:flex;
  align-items:center; justify-content:center;
  font-size:12px; color:#fff;
}
.option-card.selected .opt-check { border-color:var(--accent); background:var(--accent); }
.option-card .opt-body { flex:1; min-width:0; }
.option-card .opt-label { font-weight:600; font-size:14px; color:var(--text); }
.option-card .opt-desc { font-size:12px; color:var(--text-secondary); margin-top:3px; line-height:1.4; }

.option-card.other-option { border-style:dashed; background:transparent; }
.option-card.other-option:hover { border-color:var(--warning); background:var(--warning-dim); }
.option-card.other-option.selected {
  border-color:var(--warning); background:rgba(251,191,36,0.08);
  box-shadow:0 0 0 1px var(--warning);
}
.option-card.other-option.selected .opt-radio { border-color:var(--warning); background:var(--warning); }
.option-card.other-option.selected .opt-check { border-color:var(--warning); background:var(--warning); }

.custom-input-wrap { margin-top:8px; display:none; width:100%; }
.custom-input-wrap.visible { display:block; }
.custom-input-wrap input {
  width:100%; padding:10px 14px; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--bg);
  color:var(--text); font-size:14px; outline:none;
  transition:var(--transition);
}
.custom-input-wrap input:focus { border-color:var(--warning); box-shadow:0 0 0 3px var(--warning-dim); }

.q-navigation {
  display:flex; gap:10px; justify-content:space-between;
  margin-top:22px; padding-top:18px; border-top:1px solid var(--border);
}
.q-navigation button {
  padding:11px 26px; border-radius:var(--radius-sm);
  font-size:14px; font-weight:600; cursor:pointer;
  transition:var(--transition); border:none;
}
.q-navigation .btn-back { background:var(--surface-hover); color:var(--text-secondary); }
.q-navigation .btn-back:hover { background:var(--surface-raised); color:var(--text); }
.q-navigation .btn-next, .q-navigation .btn-submit {
  background:linear-gradient(135deg, var(--accent) 0%, #6880e8 100%);
  color:#fff; margin-left:auto;
  box-shadow:0 2px 12px rgba(123,159,255,0.3);
}
.q-navigation .btn-next:hover, .q-navigation .btn-submit:hover { filter:brightness(1.1); transform:translateY(-1px); }
.q-navigation .btn-next:disabled, .q-navigation .btn-submit:disabled { opacity:0.3; cursor:not-allowed; transform:none; box-shadow:none; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="dot disconnected" id="status-dot"></span>
        <h1>Lite Agent</h1>
      </div>
      <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="折叠侧边栏">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 3L5 8L10 13"/>
        </svg>
      </button>
    </div>
    <div class="status-bar">
      <span id="status-text">未连接</span>
      <span class="addr" id="server-addr">&mdash;</span>
    </div>
    <div class="session-actions">
      <button onclick="createSession()">＋ <span class="btn-text">新建任务</span></button>
    </div>
    <div id="session-list">
      <div class="empty-state">暂无任务</div>
    </div>
    <div class="sidebar-collapsed-icons" id="sidebar-collapsed-icons">
      <!-- 折叠态图标由 JS 动态渲染 -->
    </div>
    <div id="task-panel">
      <div class="task-panel-header" onclick="toggleTaskPanel()">
        <div class="left">
          <span class="toggle-arrow">▼</span>
          <span>子任务</span>
        </div>
        <span class="task-count" id="task-count">0</span>
      </div>
      <div id="task-list">
        <div class="empty-state" style="font-size:11px;padding:16px 0;">暂无子任务</div>
      </div>
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <span class="session-title" id="current-session-title">选择或创建一个任务</span>
      <div class="actions">
        <button onclick="showConfig()" title="配置大模型和连接">设置</button>
        <button onclick="clearSession()" title="清空当前对话">清空对话</button>
        <button class="danger" onclick="deleteCurrentSession()" title="删除当前任务">删除任务</button>
      </div>
    </div>
    <div id="messages">
      <div class="welcome">
        <div class="icon">🤖</div>
        <h2>Lite Agent 控制面板</h2>
        <p>通过 WebSocket 连接到 lite-agent 服务，创建多个并行任务，实时查看 AI 执行过程</p>
        <div class="hints">
          <span class="hint" onclick="sendHint('帮我分析这个项目的代码结构')">分析项目结构</span>
          <span class="hint" onclick="sendHint('帮我写一个 HTTP 服务器')">编写代码</span>
          <span class="hint" onclick="sendHint('统计所有 Go 文件的代码行数')">代码统计</span>
        </div>
      </div>
    </div>
    <div id="input-area">
      <div class="input-row">
        <textarea id="input" placeholder="输入消息，Enter 发送，Shift+Enter 换行..." rows="1" onkeydown="return onInputKey(event)"></textarea>
        <button id="stop-btn" onclick="stopStreaming()" title="停止生成">停止</button>
        <button id="send-btn" onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="config-modal" style="display:none">
  <div class="modal">
    <h3>配置</h3>

    <label>LLM 提供者</label>
    <select id="cfg-provider" onchange="onProviderChange()" style="width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;margin-top:4px;">
      <option value="custom">自定义</option>
      <option value="openai">OpenAI (GPT-4o)</option>
      <option value="deepseek">DeepSeek (V4 Pro)</option>
      <option value="moonshot">Moonshot (Kimi)</option>
      <option value="zhipu">智谱 (GLM-4)</option>
      <option value="qwen">通义千问</option>
      <option value="ollama">Ollama (本地)</option>
    </select>

    <label>API Base URL</label>
    <input id="cfg-base-url" type="text" placeholder="https://api.openai.com/v1">

    <label>API Key</label>
    <input id="cfg-api-key" type="password" placeholder="sk-...">

    <label>模型名称</label>
    <input id="cfg-model" type="text" placeholder="gpt-4o">

    <label style="margin-top:16px;">WebSocket 地址</label>
    <input id="cfg-url" type="text" value="ws://localhost:9090/ws" placeholder="ws://localhost:9090/ws">

    <!-- Telegram Bot 配置 -->
    <div class="telegram-section">
      <div class="section-title">Telegram Bot</div>

      <label>Bot Token</label>
      <div style="display:flex;gap:8px;">
        <input id="cfg-tg-token" type="password" placeholder="123456:ABC-DEF" style="flex:1;">
        <button onclick="toggleTgToken()" style="padding:8px 12px;background:var(--surface);border:1px solid var(--border);color:var(--text-secondary);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;white-space:nowrap;transition:var(--transition);">显示</button>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">
        在 Telegram 找 <code style="background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:4px;">@BotFather</code>，发送 <code style="background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:4px;">/newbot</code> 创建
      </div>

      <div class="telegram-status stopped" id="tg-status" style="display:none;">
        <span class="status-dot"></span>
        <span id="tg-status-text">未启动</span>
      </div>

      <div class="telegram-actions">
        <button class="tg-start" id="tg-start-btn" onclick="startTelegramBot()">启动 Bot</button>
        <button class="tg-stop" id="tg-stop-btn" onclick="stopTelegramBot()" disabled>停止</button>
      </div>
    </div>

    <!-- MCP 服务器配置 -->
    <div class="mcp-section">
      <div class="section-title">MCP 服务器</div>
      <div class="mcp-server-list" id="mcp-server-list">
        <div style="font-size:12px;color:var(--text-muted);padding:4px 0;">加载中...</div>
      </div>
      <button class="mcp-add-btn" onclick="showMCPServerForm(-1)">＋ 添加 MCP 服务器</button>
      <div class="mcp-hint">仅管理用户级配置（~/.lite-agent/mcp.json），保存后立即生效。</div>
    </div>

    <div class="modal-buttons">
      <button class="secondary" onclick="closeConfig()">取消</button>
      <button class="primary" onclick="saveConfig()">保存并连接</button>
    </div>
  </div>
</div>

<!-- MCP 服务器编辑弹层 -->
<div class="mcp-modal-overlay" id="mcp-server-modal" style="display:none">
  <div class="mcp-modal">
    <h3 id="mcp-form-title">添加 MCP 服务器</h3>
    <input type="hidden" id="mcp-edit-index" value="-1">

    <label>服务器名称 <span style="color:var(--error)">*</span></label>
    <input id="mcp-name" type="text" placeholder="如: filesystem, github, postgres">

    <label>命令 <span style="color:var(--error)">*</span></label>
    <input id="mcp-command" type="text" placeholder="如: npx, uvx, node, /path/to/binary">

    <label>参数（每行一个）</label>
    <textarea id="mcp-args" rows="3" placeholder="-y&#10;@anthropic-ai/mcp-server-filesystem&#10;/path/to/dir"></textarea>

    <label>环境变量</label>
    <div class="env-kv-list" id="mcp-env-list"></div>
    <button class="btn-add-env" onclick="addEnvRow('','')">＋ 添加环境变量</button>

    <div class="modal-buttons">
      <button class="secondary" onclick="closeMCPServerForm()">取消</button>
      <button class="primary" onclick="saveMCPServer()">保存</button>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ========== STATE ==========
  var defaultUrl = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws';
  var state = {
    serverUrl: localStorage.getItem('lite_agent_url') || defaultUrl,
    sessions: [],
    activeSessionId: null,
    currentTasks: {},
    ws: null,
    reconnectTimer: null
  };

  var streamStates = {};
  var pendingMessages = {};
  var STREAM_TIMEOUT_MS = 300000;
  var streamTimers = {};

  var tgState = {
    token: localStorage.getItem('lite_agent_tg_token') || '',
    status: 'stopped',
    username: '',
    error: ''
  };

  var TOOL_NAMES_ZH = {
    calculator: '计算器', system_info: '系统信息',
    shell: '命令行', file_edit: '文件编辑', file_write: '文件写入',
    file_diff: '文件对比', file_read: '文件读取',
    code_probe: '代码探查', code_stats: '代码统计',
    lsp: '代码智能', agent: '子Agent',
    task_create: '创建任务', task_update: '更新任务',
    task_list: '任务列表', task_get: '获取任务',

    grep: '文本搜索', glob: '文件查找',
    web_fetch: '网页抓取', web_search: '网页搜索'
  };

  var LLM_PROVIDERS = {
    openai:   { base_url: 'https://api.openai.com/v1',       model: 'gpt-4o' },
    deepseek: { base_url: 'https://api.deepseek.com/v1',      model: 'deepseek-v4-pro' },
