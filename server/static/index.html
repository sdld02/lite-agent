<script>
(function() {
  'use strict';

  // ========== STATE ==========
  // 默认 WebSocket 地址从当前页面 URL 推导（同 IP 端口）
  var defaultUrl = (window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host + '/ws';
  var state = {
    serverUrl: localStorage.getItem('lite_agent_url') || defaultUrl,
    sessions: [],
    activeSessionId: null,
    currentTasks: {},  // key: sessionId (serverSessionId), value: tasks array
    ws: null,
    reconnectTimer: null
  };

  // Per-session 流式状态 map（key = 前端 session id）
  // 每个 entry: { msgIdx, containerEl, lastType, lastEl, streaming }
  var streamStates = {};

  // Per-session 待发送消息队列（key = 前端 session id）
  // 当 serverSessionId 尚未就绪时，chat 消息暂存于此，等 session_info 回来后发送
  var pendingMessages = {};

  // Streaming 超时检测：如果 streaming 状态超过 5 分钟无任何事件，自动重置
  var STREAM_TIMEOUT_MS = 300000;
  var streamTimers = {};

  // Telegram Bot 状态
  var tgState = {
    token: localStorage.getItem('lite_agent_tg_token') || '',
    status: 'stopped',
    username: '',
    error: ''
  };

  // 工具英文名 → 中文名映射
  var TOOL_NAMES_ZH = {
    calculator: '计算器', system_info: '系统信息', current_time: '当前时间',
    shell: '命令行', file_edit: '文件编辑', file_write: '文件写入',
    file_diff: '文件对比', file_read: '文件读取',
    code_probe: '代码探查', code_stats: '代码统计',
    lsp: '代码智能', agent: '子Agent',
    task_create: '创建任务', task_update: '更新任务',
    task_list: '任务列表', task_get: '获取任务'
  };

  // LLM Provider 预设
  var LLM_PROVIDERS = {
    openai:   { base_url: 'https://api.openai.com/v1',       model: 'gpt-4o' },
    deepseek: { base_url: 'https://api.deepseek.com/v1',      model: 'deepseek-v4-pro' },
    moonshot: { base_url: 'https://api.moonshot.cn/v1',       model: 'moonshot-v1-8k' },
    zhipu:    { base_url: 'https://open.bigmodel.cn/api/paas/v4', model: 'glm-4' },
    qwen:     { base_url: 'https://dashscope.aliyuncs.com/compatible-mode/v1', model: 'qwen-turbo' },
    ollama:   { base_url: 'http://localhost:11434/v1',        model: 'llama2' }
  };

  // ========== HELPERS ==========
  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function getActiveSession() {
    for (var i = 0; i < state.sessions.length; i++) {
      if (state.sessions[i].id === state.activeSessionId) return state.sessions[i];
    }
    return null;
  }

  // 通过 serverSessionId 查找前端 session
  function findSessionByServerId(serverSessionId) {
    if (!serverSessionId) return null;
    for (var i = 0; i < state.sessions.length; i++) {
      if (state.sessions[i].serverSessionId === serverSessionId) return state.sessions[i];
    }
    return null;
  }

  // 检查当前活跃 session 是否正在 streaming
  function isActiveStreaming() {
    var s = getActiveSession();
    if (!s) return false;
    var ss = streamStates[s.id];
    return ss && ss.streaming;
  }

  // 检查是否有任何 session 正在 streaming
  function hasAnyStreaming() {
    for (var key in streamStates) {
      if (streamStates[key] && streamStates[key].streaming) return true;
    }
    return false;
  }

  // ========== SESSION MANAGEMENT ==========
  window.createSession = function() {
    var s = {
      id: 's_' + Date.now(),
      name: '新任务',
      createdAt: new Date().toISOString(),
      messageCount: 0,
      preview: '',
      messages: [],
      serverSessionId: null
    };
    state.sessions.unshift(s);
    state.activeSessionId = s.id;
    renderSessions();
    renderMessages();
    updateSendButton();
    ensureConnected();
    sendWS({ type: 'new_session', session_id: s.id });
  };

  window.switchSession = function(id) {
    if (state.activeSessionId === id) return;
    state.activeSessionId = id;
    renderSessions();
    var s = getActiveSession();
    // 如果该 session 正在 streaming，恢复其流式 DOM
    var ss = s ? streamStates[s.id] : null;
    if (ss && ss.streaming) {
      // 重绘消息（包括流式中的消息），然后重建流式 DOM 引用
      renderMessages();
      rebuildStreamDOM(s.id);
    } else {
      renderMessages();
    }
    // 只有本地无消息但服务端有消息时才从服务端加载历史
    if (s && s.serverSessionId && s.messages.length === 0 && s.messageCount > 0) {
      sendWS({ type: 'load_session', session_id: s.serverSessionId });
    }
    // 渲染该 session 的任务列表
    renderTasks();
    updateSendButton();
  };

  window.deleteSession = function(id) {
    var idx = -1;
    for (var i = 0; i < state.sessions.length; i++) {
      if (state.sessions[i].id === id) { idx = i; break; }
    }
    if (idx < 0) return;
    var s = state.sessions[idx];
    // 清理流式状态和待发送消息
    if (streamStates[id]) delete streamStates[id];
    if (pendingMessages[id]) delete pendingMessages[id];
    if (streamTimers[id]) { clearTimeout(streamTimers[id]); delete streamTimers[id]; }
    state.sessions.splice(idx, 1);
    if (state.activeSessionId === id) {
      state.activeSessionId = state.sessions.length > 0 ? state.sessions[0].id : null;
    }
    renderSessions();
    renderMessages();
    updateSendButton();
    if (s.serverSessionId) {
      sendWS({ type: 'delete_session', session_id: s.serverSessionId });
    }
  };

  window.clearSession = function() {
    var s = getActiveSession();
    if (!s) return;
    // 如果正在 streaming，先取消
    if (streamStates[s.id] && streamStates[s.id].streaming) {
      stopSessionStreaming(s.id);
    }
    s.messages = [];
    s.messageCount = 0;
    s.preview = '';
    s.serverSessionId = null;
    // 清理待发送消息（旧 session 的消息不应发送到新 session）
    if (pendingMessages[s.id]) delete pendingMessages[s.id];
    if (streamTimers[s.id]) { clearTimeout(streamTimers[s.id]); delete streamTimers[s.id]; }
    renderMessages();
    sendWS({ type: 'new_session', session_id: s.id });
  };

  window.deleteCurrentSession = function() {
    if (!state.activeSessionId) return;
    if (!confirm('确定要删除此任务吗？')) return;
    deleteSession(state.activeSessionId);
  };

  window.sendHint = function(text) {
    document.getElementById('input').value = text;
    sendMessage();
  };

  // ========== RENDER ==========
  // ========== TASK PANEL ==========
  function requestTasks(serverSessionId) {
    if (serverSessionId) {
      sendWS({ type: 'get_tasks', session_id: serverSessionId });
    } else {
      sendWS({ type: 'get_tasks' });
    }
  }

  function renderTasks() {
    var s = getActiveSession();
    var tasks = (s && s.serverSessionId && state.currentTasks[s.serverSessionId]) || [];
    var list = document.getElementById('task-list');
    var count = document.getElementById('task-count');
    count.textContent = tasks.length;

    var pending = 0, inProgress = 0, completed = 0;
    for (var i = 0; i < tasks.length; i++) {
      if (tasks[i].status === 'pending') pending++;
      else if (tasks[i].status === 'in_progress') inProgress++;
      else if (tasks[i].status === 'completed') completed++;
    }
    count.title = '待处理:' + pending + ' 进行中:' + inProgress + ' 已完成:' + completed;

    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty-state" style="font-size:11px;padding:16px 0;">暂无子任务</div>';
    } else {
      var html = '';
      for (var i = 0; i < tasks.length; i++) {
        var t = tasks[i];
        var cls = 'task-item';
        if (t.status === 'completed') cls += ' completed';
        var iconCls = 'task-status-icon ' + t.status;
        var iconTitle = t.status === 'pending' ? '待处理' : t.status === 'in_progress' ? '进行中' : '已完成';
        html += '<div class="' + cls + '" title="' + escHtml(t.subject) + '">';
        html += '<span class="' + iconCls + '" title="' + iconTitle + '"></span>';
        html += '<div class="task-info"><div class="task-subject">' + escHtml(t.subject) + '</div></div>';
        html += '<span class="task-id">#' + escHtml(t.id) + '</span>';
        html += '</div>';
      }
      list.innerHTML = html;
    }
  }

  function renderSessions() {
    var list = document.getElementById('session-list');
    if (state.sessions.length === 0) {
      list.innerHTML = '<div class="empty-state">暂无任务<br>点击「＋ 新建任务」开始</div>';
    } else {
      var html = '';
      for (var i = 0; i < state.sessions.length; i++) {
        var s = state.sessions[i];
        var activeClass = s.id === state.activeSessionId ? ' active' : '';
        var ss = streamStates[s.id];
        var isStreaming = ss && ss.streaming;
        html += '<div class="session-item' + activeClass + '" onclick="switchSession(\'' + s.id + '\')">';
        html += '<div class="info"><div class="name">';
        if (isStreaming) html += '<span class="spinner-dot" style="margin-right:6px;"></span>';
        html += escHtml(s.name) + '</div>';
        html += '<div class="meta">' + s.messageCount + ' 条消息</div></div>';
        html += '<button class="delete-btn" onclick="event.stopPropagation();deleteSession(\'' + s.id + '\')" title="删除">✕</button>';
        html += '</div>';
      }
      list.innerHTML = html;
    }
    var active = getActiveSession();
    document.getElementById('current-session-title').textContent = active ? active.name : '选择或创建一个任务';
  }

  function renderMessages() {
    var container = document.getElementById('messages');
    var s = getActiveSession();
    if (!s || !s.messages || s.messages.length === 0) {
      container.innerHTML = '<div class="welcome"><div class="icon">🤖</div><h2>Lite Agent 控制面板</h2><p>通过 WebSocket 连接到 lite-agent 服务，创建多个并行任务，实时查看 AI 执行过程</p><div class="hints"><span class="hint" onclick="sendHint(\'帮我分析这个项目的代码结构\')">📊 分析项目结构</span><span class="hint" onclick="sendHint(\'帮我写一个 HTTP 服务器\')">🔧 编写代码</span><span class="hint" onclick="sendHint(\'统计所有 Go 文件的代码行数\')">📈 代码统计</span></div></div>';
    } else {
      var html = '';
      for (var i = 0; i < s.messages.length; i++) {
        html += renderMessage(s.messages[i], i);
      }
      container.innerHTML = html;
      container.scrollTop = container.scrollHeight;
    }
  }

  function convertHistoryMessages(rawMessages) {
    var frontMessages = [];
    for (var i = 0; i < rawMessages.length; i++) {
      var raw = rawMessages[i];
      if (raw.role === 'user') {
        frontMessages.push({ role: 'user', content: raw.content || '', reasoning: '', toolCalls: [] });
      } else if (raw.role === 'assistant') {
        var toolCalls = [];
        var segments = [];
        if (raw.reasoning_content) segments.push({ type: 'reasoning', content: raw.reasoning_content });
        if (raw.content) segments.push({ type: 'text', content: raw.content });
        if (raw.tool_calls && raw.tool_calls.length > 0) {
          for (var t = 0; t < raw.tool_calls.length; t++) {
            var tc = raw.tool_calls[t];
            var args = {};
            try {
              if (tc.function && tc.function.arguments) {
                args = typeof tc.function.arguments === 'string' ? JSON.parse(tc.function.arguments) : tc.function.arguments;
              }
            } catch(e) { args = { _raw: tc.function ? tc.function.arguments : '' }; }
            var tcObj = { name: tc.function ? tc.function.name : 'unknown', args: args, result: undefined, error: false };
            toolCalls.push(tcObj);
            segments.push({ type: 'tool_call', name: tcObj.name, args: tcObj.args, result: undefined, error: false });
          }
        }
        frontMessages.push({ role: 'assistant', content: raw.content || '', reasoning: raw.reasoning_content || '', toolCalls: toolCalls, segments: segments, _done: true });
      } else if (raw.role === 'tool') {
        for (var j = frontMessages.length - 1; j >= 0; j--) {
          if (frontMessages[j].role === 'assistant') {
            var tcList = frontMessages[j].toolCalls;
            var segList = frontMessages[j].segments;
            for (var k = tcList.length - 1; k >= 0; k--) {
              if (tcList[k].result === undefined) { tcList[k].result = raw.content || ''; tcList[k].error = (raw.content && raw.content.indexOf('错误') === 0); break; }
            }
            for (var k2 = segList.length - 1; k2 >= 0; k2--) {
              if (segList[k2].type === 'tool_call' && segList[k2].result === undefined) { segList[k2].result = raw.content || ''; segList[k2].error = (raw.content && raw.content.indexOf('错误') === 0); break; }
            }
            break;
          }
        }
      }
    }
    return frontMessages;
  }

  function renderMessage(m, idx) {
    var html = '';
    if (m.role === 'user') {
      html += '<div class="msg user"><div class="bubble">' + escHtmlBr(m.content) + '</div></div>';
    } else if (m.role === 'assistant') {
      html += '<div class="msg assistant" id="msg-' + idx + '">';
      if (m.segments && m.segments.length > 0) {
        for (var s = 0; s < m.segments.length; s++) {
          var seg = m.segments[s];
          if (seg.type === 'reasoning' && seg.content) {
            html += '<details class="reasoning-block"><summary>🧠 思考过程</summary>' + escHtmlBr(seg.content) + '</details>';
          } else if (seg.type === 'text' && seg.content) {
            html += '<div class="bubble">' + renderMarkdown(seg.content) + '</div>';
          } else if (seg.type === 'tool_call') {
            var zhName = TOOL_NAMES_ZH[seg.name] || seg.name;
            var intent = (seg.args && seg.args.intent) ? seg.args.intent : '';
            html += '<div class="tool-card" onclick="event.stopPropagation();this.classList.toggle(\'open\')">';
            html += '<div class="tool-card-header"><span class="tool-icon">🔧</span>';
            html += '<div class="tool-info"><span class="tool-name">' + escHtml(zhName) + '</span>';
            if (intent) html += '<span class="tool-intent">· ' + escHtml(intent) + '</span>';
            html += '</div><span class="tool-arrow">▼</span></div>';
            html += '<div class="tool-card-body"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">参数</div><pre>' + escHtml(JSON.stringify(seg.args, null, 2)) + '</pre>';
            if (seg.result !== undefined) {
              html += '<div class="tool-result"><div class="tool-result-label">结果</div><pre class="' + (seg.error ? 'error' : 'success') + '">' + escHtml(seg.result) + '</pre></div>';
            }
            html += '</div></div>';
          }
        }
      } else {
        if (m.content) html += '<div class="bubble">' + renderMarkdown(m.content) + '</div>';
        if (m.toolCalls && m.toolCalls.length > 0) {
          for (var t = 0; t < m.toolCalls.length; t++) {
            var tc = m.toolCalls[t];
            var zhName = TOOL_NAMES_ZH[tc.name] || tc.name;
            var intent = (tc.args && tc.args.intent) ? tc.args.intent : '';
            html += '<div class="tool-card" onclick="event.stopPropagation();this.classList.toggle(\'open\')">';
            html += '<div class="tool-card-header"><span class="tool-icon">🔧</span>';
            html += '<div class="tool-info"><span class="tool-name">' + escHtml(zhName) + '</span>';
            if (intent) html += '<span class="tool-intent">· ' + escHtml(intent) + '</span>';
            html += '</div><span class="tool-arrow">▼</span></div>';
            html += '<div class="tool-card-body"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">参数</div><pre>' + escHtml(JSON.stringify(tc.args, null, 2)) + '</pre>';
            if (tc.result !== undefined) {
              html += '<div class="tool-result"><div class="tool-result-label">结果</div><pre class="' + (tc.error ? 'error' : 'success') + '">' + escHtml(tc.result) + '</pre></div>';
            }
            html += '</div></div>';
          }
        }
      }
      html += '</div>';
    }
    return html;
  }

  function escHtmlBr(text) {
    if (!text) return '';
    return escHtml(text).replace(/\n/g, '<br>');
  }

  function renderMarkdown(text) {
    if (!text) return '';
    var out = escHtml(text);
    out = out.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    out = out.replace(/`([^`]+)`/g, '<code>$1</code>');
    out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    out = out.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    var parts = out.split(/<pre>[\s\S]*?<\/pre>/g);
    var codes = out.match(/<pre>[\s\S]*?<\/pre>/g) || [];
    var result = '';
    for (var i = 0; i < parts.length; i++) {
      result += parts[i].replace(/\n/g, '<br>');
      if (codes[i]) result += codes[i];
    }
    return result;
  }

  // ========== WEBSOCKET ==========
  var reconnectAttempts = 0;
  var maxReconnectAttempts = 10;
  var connecting = false;
  var wsOutbox = []; // 连接建立前暂存的消息队列

  function ensureConnected() {
    if (state.ws && state.ws.readyState === WebSocket.OPEN) return;
    if (connecting) return;
    connect();
  }

  function connect() {
    if (state.reconnectTimer) { clearTimeout(state.reconnectTimer); state.reconnectTimer = null; }
    if (connecting) return;
    connecting = true;

    if (state.ws) { try { state.ws.close(); } catch(e) {} state.ws = null; }
    setStatus('connecting');
    var ws = new WebSocket(state.serverUrl);
    state.ws = ws;

    ws.onopen = function() {
      if (state.ws !== ws) return;
      connecting = false;
      reconnectAttempts = 0;
      setStatus('connected');
      // 发送连接前缓存的消息
      if (wsOutbox.length > 0) {
        for (var i = 0; i < wsOutbox.length; i++) {
          try { ws.send(wsOutbox[i]); } catch(e) { console.error('[ws] outbox send error:', e); }
        }
        wsOutbox = [];
      }
    };

    ws.onmessage = function(event) {
      if (state.ws !== ws) return;
      try { handleServerMessage(JSON.parse(event.data)); } catch(e) { console.error('JSON parse error:', e); }
    };

    ws.onclose = function() {
      connecting = false;
      if (state.ws !== ws) return;
      setStatus('disconnected');
      state.ws = null;
      if (state.sessions.length > 0 && reconnectAttempts < maxReconnectAttempts) {
        var delay = Math.min(3000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;
        state.reconnectTimer = setTimeout(connect, delay);
      }
    };

    ws.onerror = function() { connecting = false; setStatus('disconnected'); };
  }

  function sendWS(obj) {
    if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
      // 连接未就绪，暂存消息，等连接后自动发送
      wsOutbox.push(JSON.stringify(obj));
      ensureConnected();
      return;
    }
    state.ws.send(JSON.stringify(obj));
  }

  function handleServerMessage(msg) {
    // 通过 session_id 路由到正确的 session
    var serverSid = msg.session_id || '';
    var targetSession = serverSid ? findSessionByServerId(serverSid) : null;

    // 如果精确匹配失败，回退到正在 streaming 的活跃 session
    // 这处理了 serverSessionId 尚未绑定（时序竞争）的情况
    if (!targetSession && serverSid) {
      var activeS = getActiveSession();
      if (activeS && streamStates[activeS.id] && streamStates[activeS.id].streaming) {
        targetSession = activeS;
        // 顺便修复 serverSessionId 绑定（后续事件就能精确匹配了）
        activeS.serverSessionId = serverSid;
      }
    }

    switch (msg.type) {
      case 'connected':
        setStatus('connected');
        sendWS({ type: 'list_sessions' });
        // 连接成功后自动发送 LLM 配置（如果有保存的配置）
        sendLLMConfig();
        // 连接成功后查询 Telegram Bot 状态
        requestTelegramConfig();
        if (msg.session) {
          var s = getActiveSession();
          if (s && s.messages.length === 0 && msg.session.message_count > 0) {
            // 活跃 session 无消息但服务端有消息，加载历史
            sendWS({ type: 'load_session', session_id: msg.session.id });
            // 确保 serverSessionId 绑定到服务端的 session
            if (s.serverSessionId !== msg.session.id) {
              s.serverSessionId = msg.session.id;
            }
          } else if (!s) {
            state.sessions.push({
              id: msg.session.id, name: msg.session.preview ? msg.session.preview.slice(0, 30) : msg.session.id,
              createdAt: msg.session.created_at, messageCount: msg.session.message_count,
              preview: msg.session.preview, messages: [], serverSessionId: msg.session.id
            });
            state.activeSessionId = msg.session.id;
            renderSessions();
            if (msg.session.message_count > 0) sendWS({ type: 'load_session', session_id: msg.session.id });
          } else if (s) {
            // 活跃 session 已存在，确保 serverSessionId 与服务端一致
            if (!s.serverSessionId || s.serverSessionId !== msg.session.id) {
              s.serverSessionId = msg.session.id;
              renderSessions();
            }
            // 如果服务端有消息但本地没有，加载
            if (s.messages.length === 0 && msg.session.message_count > 0) {
              sendWS({ type: 'load_session', session_id: msg.session.id });
            }
          }
        }
        requestTasks();
        break;

      case 'content':
        if (targetSession) appendContent(targetSession.id, msg.content);
        break;
      case 'reasoning':
        if (targetSession) appendReasoning(targetSession.id, msg.content);
        break;
      case 'tool_call':
        if (targetSession) appendToolCall(targetSession.id, msg.tool_call);
        break;
      case 'tool_call_progress':
        if (targetSession) updateToolCallProgress(targetSession.id, msg.tool_call_progress);
        break;
      case 'tool_result':
        if (targetSession) updateToolResult(targetSession.id, msg.result);
        break;
      case 'ask_question':
        if (targetSession && msg.questions) {
          showQuestionModal(targetSession.id, msg.questions);
        }
        break;
      case 'done':
        if (targetSession) finishStream(targetSession.id, msg.response, null);
        break;
      case 'error':
        // error 可能来自流式执行，也可能是非流式错误
        if (targetSession && streamStates[targetSession.id] && streamStates[targetSession.id].streaming) {
          finishStream(targetSession.id, null, msg.error);
        } else if (!targetSession) {
          // session_id 不匹配任何前端 session，尝试清理活跃 session 的 streaming 状态
          var activeS = getActiveSession();
          if (activeS && streamStates[activeS.id] && streamStates[activeS.id].streaming) {
            finishStream(activeS.id, null, msg.error);
          }
        }
        toast(msg.error, 'error');
        break;

      case 'session_info':
        if (msg.session) {
          // 1) 通过 server session_id 精确匹配（已绑定过的 session）
          var infoTarget = targetSession;
          // 2) 通过 client_session_id 精确匹配（服务端回传的前端 session ID）
          if (!infoTarget && msg.client_session_id) {
            infoTarget = getSessionById(msg.client_session_id);
          }
          // 3) 最后兜底：查找第一个 serverSessionId 为 null 的 session
          if (!infoTarget) {
            for (var pi = 0; pi < state.sessions.length; pi++) {
              if (state.sessions[pi].serverSessionId === null) { infoTarget = state.sessions[pi]; break; }
            }
          }
          if (infoTarget) {
            infoTarget.serverSessionId = msg.session.id;
            infoTarget.messageCount = msg.session.message_count;
            infoTarget.preview = msg.session.preview || '';
            infoTarget.name = msg.session.preview ? msg.session.preview.slice(0, 30) : '新任务';
            renderSessions();
            flushPendingMessages(infoTarget.id);
          }
        }
        break;

      case 'session_loaded':
        if (msg.session && msg.messages) {
          var sl = targetSession;
          if (!sl) {
            sl = {
              id: msg.session.id, name: msg.session.preview ? msg.session.preview.slice(0, 30) : msg.session.id,
              createdAt: msg.session.created_at, messageCount: msg.session.message_count,
              preview: msg.session.preview || '', messages: [], serverSessionId: msg.session.id
            };
            var found = false;
            for (var si = 0; si < state.sessions.length; si++) {
              if (state.sessions[si].id === sl.id) { state.sessions[si] = sl; found = true; break; }
            }
            if (!found) state.sessions.push(sl);
            if (!state.activeSessionId) state.activeSessionId = sl.id;
          }
          sl.messages = convertHistoryMessages(msg.messages);
          sl.messageCount = sl.messages.length;
          sl.serverSessionId = msg.session.id;
          sl.preview = msg.session.preview || '';
          sl.name = msg.session.preview ? msg.session.preview.slice(0, 30) : '新任务';
          renderSessions();
          // 只有当 loaded 的是当前活跃 session 时才重绘消息区域
          if (sl.id === state.activeSessionId) renderMessages();
          requestTasks(sl.serverSessionId);
        }
        break;

      case 'session_list':
        if (msg.sessions) {
          for (var i = 0; i < msg.sessions.length; i++) {
            var si = msg.sessions[i];
            var found = null;
            for (var j = 0; j < state.sessions.length; j++) {
              if (state.sessions[j].id === si.id || state.sessions[j].serverSessionId === si.id) { found = state.sessions[j]; break; }
            }
            if (found) {
              found.messageCount = si.message_count;
              found.preview = si.preview;
              found.name = si.preview ? si.preview.slice(0, 30) : si.id;
              if (!found.serverSessionId) found.serverSessionId = si.id;
              if (!found.messages) found.messages = [];
            } else {
              state.sessions.push({
                id: si.id, name: si.preview ? si.preview.slice(0, 30) : si.id,
                createdAt: si.created_at, messageCount: si.message_count,
                preview: si.preview, messages: [], serverSessionId: si.id
              });
            }
          }
          renderSessions();
          if (!state.activeSessionId && state.sessions.length > 0) {
            state.activeSessionId = state.sessions[0].id;
            renderSessions();
          }
        }
        break;

      case 'status':
        if (msg.status) {
          document.getElementById('server-addr').textContent = msg.status.active_connections + ' 连接 · ' + msg.status.uptime;
        }
        break;

      case 'tasks':
        // 按 session_id 存储任务列表
        if (serverSid) {
          state.currentTasks[serverSid] = msg.tasks || [];
        }
        // 如果是当前活跃 session 的任务，刷新显示
        var activeS = getActiveSession();
        if (activeS && activeS.serverSessionId === serverSid) {
          renderTasks();
        }
        break;

      case 'llm_config':
        if (msg.llm_config) {
          if (msg.llm_config.base_url) {
            llmState.baseUrl = msg.llm_config.base_url;
            localStorage.setItem('lite_agent_base_url', llmState.baseUrl);
          }
          if (msg.llm_config.model) {
            llmState.model = msg.llm_config.model;
            localStorage.setItem('lite_agent_model', llmState.model);
          }
          if (msg.llm_config.provider) {
            llmState.provider = msg.llm_config.provider;
            localStorage.setItem('lite_agent_provider', llmState.provider);
          }
          // API Key 是脱敏的，仅当本地没有时才用服务端值（通常不会更新 key）
          if (msg.llm_config.api_key && !llmState.apiKey) {
            llmState.apiKey = ''; // 脱敏 key 不保存
          }
          // 如果配置弹窗打开，更新弹窗中的值
          updateConfigModalIfOpen();
        }
        break;

      case 'telegram_config':
        if (msg.telegram_config) {
          tgState.status = msg.telegram_config.status || 'stopped';
          tgState.username = msg.telegram_config.username || '';
          tgState.error = msg.telegram_config.error || '';
          // Token 仅在首次设置时更新（服务端返回脱敏版本）
          if (msg.telegram_config.token && !tgState.token) {
            tgState.token = msg.telegram_config.token;
          }
          updateTgStatusUI();
        }
        break;
    }
  }

  // ========== PER-SESSION STREAMING ==========

  function getStreamState(sessionId) {
    if (!streamStates[sessionId]) {
      streamStates[sessionId] = { msgIdx: -1, containerEl: null, lastType: '', lastEl: null, streaming: false };
    }
    return streamStates[sessionId];
  }

  function isSessionVisible(sessionId) {
    return sessionId === state.activeSessionId;
  }

  function getSessionById(sessionId) {
    for (var i = 0; i < state.sessions.length; i++) {
      if (state.sessions[i].id === sessionId) return state.sessions[i];
    }
    return null;
  }

  function ensureStreamMsg(sessionId) {
    var s = getSessionById(sessionId);
    if (!s) return null;
    var ss = getStreamState(sessionId);
    ss.streaming = true;
    var visible = isSessionVisible(sessionId);

    var lastMsg = s.messages[s.messages.length - 1];
    if (!lastMsg || lastMsg.role !== 'assistant' || lastMsg._done) {
      s.messages.push({ role: 'assistant', content: '', reasoning: '', toolCalls: [], segments: [], _done: false });
      ss.msgIdx = s.messages.length - 1;
      ss.lastType = '';
      ss.lastEl = null;

      if (visible) {
        var container = document.getElementById('messages');
        var welcome = container.querySelector('.welcome');
        if (welcome) welcome.remove();
        var div = document.createElement('div');
        div.className = 'msg assistant streaming';
        div.id = 'msg-' + ss.msgIdx;
        div.innerHTML = '<div class="stream-container" id="stream-' + sessionId + '-' + ss.msgIdx + '"></div>';
        container.appendChild(div);
        ss.containerEl = document.getElementById('stream-' + sessionId + '-' + ss.msgIdx);
      } else {
        ss.containerEl = null;
      }
    } else {
      ss.msgIdx = s.messages.length - 1;
      if (visible && !ss.containerEl) {
        ss.containerEl = document.getElementById('stream-' + sessionId + '-' + ss.msgIdx);
      }
    }
    updateSendButton();
    return s.messages[s.messages.length - 1];
  }

  // 切换到 streaming session 时，重建流式 DOM 容器和已有内容
  function rebuildStreamDOM(sessionId) {
    var ss = streamStates[sessionId];
    if (!ss || !ss.streaming) return;

    var s = getSessionById(sessionId);
    if (!s) return;
    var cur = s.messages[ss.msgIdx];
    if (!cur) return;

    // 找到消息 DOM 元素
    var msgEl = document.getElementById('msg-' + ss.msgIdx);
    if (!msgEl) return;

    // 用流式容器替换静态 HTML
    var containerId = 'stream-' + sessionId + '-' + ss.msgIdx;
    msgEl.className = 'msg assistant streaming';
    msgEl.innerHTML = '<div class="stream-container" id="' + containerId + '"></div>';
    ss.containerEl = document.getElementById(containerId);
    ss.lastType = '';
    ss.lastEl = null;

    if (!ss.containerEl || !cur.segments) return;

    // 从 segments 数据重建 DOM
    for (var i = 0; i < cur.segments.length; i++) {
      var seg = cur.segments[i];
      if (seg.type === 'reasoning' && seg.content) {
        var details = document.createElement('details');
        details.className = 'reasoning-block';
        details.open = true;
        details.innerHTML = '<summary>🧠 思考过程</summary><div class="reasoning-content">' + escHtml(seg.content) + '</div>';
        ss.containerEl.appendChild(details);
        ss.lastType = 'reasoning';
        ss.lastEl = details;
      } else if (seg.type === 'text' && seg.content) {
        var bubble = document.createElement('div');
        bubble.className = 'bubble streaming-cursor';
        bubble.textContent = seg.content;
        ss.containerEl.appendChild(bubble);
        ss.lastType = 'text';
        ss.lastEl = bubble;
      } else if (seg.type === 'tool_call') {
        var zhName = TOOL_NAMES_ZH[seg.name] || seg.name;
        var intent = (seg.args && seg.args.intent) ? seg.args.intent : '';
        var card = document.createElement('div');
        card.className = 'tool-card';
        card.setAttribute('data-tool-name', seg.name);
        var headerHtml = '<div class="tool-card-header" onclick="event.stopPropagation();this.parentElement.classList.toggle(\'open\')">' +
          '<span class="tool-icon">🔧</span>' +
          '<div class="tool-info"><span class="tool-name">' + escHtml(zhName) + '</span>';
        if (intent) headerHtml += '<span class="tool-intent">· ' + escHtml(intent) + '</span>';
        headerHtml += '</div><span class="tool-arrow">▼</span></div>';
        var resultHtml = '';
        if (seg.result !== undefined) {
          resultHtml = '<div class="tool-result"><div class="tool-result-label">结果</div><pre class="' + (seg.error ? 'error' : 'success') + '">' + escHtml(seg.result) + '</pre></div>';
        } else {
          resultHtml = '<div class="tool-result"><div class="tool-result-label">结果</div><pre class="success" style="opacity:0.6">⏳ 执行中...</pre></div>';
        }
        card.innerHTML = headerHtml +
          '<div class="tool-card-body"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">参数</div>' +
          '<pre>' + escHtml(JSON.stringify(seg.args, null, 2)) + '</pre>' +
          resultHtml + '</div>';
        ss.containerEl.appendChild(card);
        ss.lastType = 'tool_call';
        ss.lastEl = card;
      }
    }

    // 滚动到底部
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
  }

  function appendReasoning(sessionId, chunk) {
    var cur = ensureStreamMsg(sessionId);
    if (!cur) return;
    var ss = getStreamState(sessionId);
    cur.reasoning += chunk;
    if (!cur.segments) cur.segments = [];
    var lastSeg = cur.segments[cur.segments.length - 1];
    if (lastSeg && lastSeg.type === 'reasoning') { lastSeg.content += chunk; }
    else { cur.segments.push({ type: 'reasoning', content: chunk }); }
    var lastRS = null;
    for (var si = cur.segments.length - 1; si >= 0; si--) {
      if (cur.segments[si].type === 'reasoning') { lastRS = cur.segments[si]; break; }
    }
    var displayReasoning = lastRS ? lastRS.content : cur.reasoning;
    if (ss.containerEl) {
      if (ss.lastType === 'reasoning' && ss.lastEl) {
        var rc = ss.lastEl.querySelector('.reasoning-content');
        if (rc) rc.textContent = displayReasoning;
      } else {
        var details = document.createElement('details');
        details.className = 'reasoning-block';
        details.open = true;
        details.innerHTML = '<summary>🧠 思考过程</summary><div class="reasoning-content">' + escHtml(displayReasoning) + '</div>';
        ss.containerEl.appendChild(details);
        ss.lastType = 'reasoning';
        ss.lastEl = details;
      }
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  }

  function appendContent(sessionId, chunk) {
    var cur = ensureStreamMsg(sessionId);
    if (!cur) return;
    var ss = getStreamState(sessionId);
    cur.content += chunk;
    if (!cur.segments) cur.segments = [];
    var lastSeg = cur.segments[cur.segments.length - 1];
    if (lastSeg && lastSeg.type === 'text') { lastSeg.content += chunk; }
    else { cur.segments.push({ type: 'text', content: chunk }); }
    var lastTS = null;
    for (var si = cur.segments.length - 1; si >= 0; si--) {
      if (cur.segments[si].type === 'text') { lastTS = cur.segments[si]; break; }
    }
    var displayContent = lastTS ? lastTS.content : cur.content;
    if (ss.containerEl) {
      if (ss.lastType === 'text' && ss.lastEl) {
        ss.lastEl.textContent = displayContent;
      } else {
        var bubble = document.createElement('div');
        bubble.className = 'bubble streaming-cursor';
        bubble.textContent = displayContent;
        ss.containerEl.appendChild(bubble);
        ss.lastType = 'text';
        ss.lastEl = bubble;
      }
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  }

  function updateToolCallProgress(sessionId, progress) {
    if (!progress) return;
    var cur = ensureStreamMsg(sessionId);
    if (!cur) return;
    var ss = getStreamState(sessionId);
    if (ss.containerEl) {
      var progressEl = ss.containerEl.querySelector('.tool-progress-indicator');
      if (!progressEl) {
        progressEl = document.createElement('div');
        progressEl.className = 'tool-progress-indicator';
        progressEl.style.cssText = 'padding:8px 12px;color:var(--text-muted);font-size:12px;display:flex;align-items:center;gap:6px;';
        ss.containerEl.appendChild(progressEl);
      }
      var kb = (progress.args_bytes / 1024).toFixed(1);
      var zhName = TOOL_NAMES_ZH[progress.name] || progress.name;
      progressEl.innerHTML = '<span class="spinner-dot"></span> ' + escHtml(zhName) + ': 生成参数中... ' + kb + 'KB';
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  }

  function appendToolCall(sessionId, tc) {
    var cur = ensureStreamMsg(sessionId);
    if (!cur) return;
    var ss = getStreamState(sessionId);
    if (ss.containerEl) {
      var progressEl = ss.containerEl.querySelector('.tool-progress-indicator');
      if (progressEl) progressEl.remove();
    }
    cur.toolCalls.push({ name: tc.name, args: tc.args, result: undefined, open: false });
    if (!cur.segments) cur.segments = [];
    cur.segments.push({ type: 'tool_call', name: tc.name, args: tc.args, result: undefined, open: false });
    if (ss.containerEl) {
      var zhName = TOOL_NAMES_ZH[tc.name] || tc.name;
      var intent = (tc.args && tc.args.intent) ? tc.args.intent : '';
      var card = document.createElement('div');
      card.className = 'tool-card';
      card.setAttribute('data-tool-name', tc.name);
      var headerHtml = '<div class="tool-card-header" onclick="event.stopPropagation();this.parentElement.classList.toggle(\'open\')">' +
        '<span class="tool-icon">🔧</span>' +
        '<div class="tool-info"><span class="tool-name">' + escHtml(zhName) + '</span>';
      if (intent) headerHtml += '<span class="tool-intent">· ' + escHtml(intent) + '</span>';
      headerHtml += '</div><span class="tool-arrow">▼</span></div>';
      card.innerHTML = headerHtml +
        '<div class="tool-card-body"><div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">参数</div>' +
        '<pre>' + escHtml(JSON.stringify(tc.args, null, 2)) + '</pre>' +
        '<div class="tool-result"><div class="tool-result-label">结果</div>' +
        '<pre class="success" style="opacity:0.6">⏳ 执行中...</pre></div></div>';
      ss.containerEl.appendChild(card);
      ss.lastType = 'tool_call';
      ss.lastEl = card;
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  }

  function updateToolResult(sessionId, result) {
    var cur = ensureStreamMsg(sessionId);
    if (!cur) return;
    var ss = getStreamState(sessionId);
    var lastTc = null;
    if (cur.toolCalls && cur.toolCalls.length > 0) {
      lastTc = cur.toolCalls[cur.toolCalls.length - 1];
      lastTc.result = result;
      lastTc.error = result.indexOf('错误') === 0;
    }
    if (cur.segments && cur.segments.length > 0) {
      for (var i = cur.segments.length - 1; i >= 0; i--) {
        if (cur.segments[i].type === 'tool_call') {
          cur.segments[i].result = result;
          cur.segments[i].error = result.indexOf('错误') === 0;
          break;
        }
      }
    }
    if (ss.containerEl) {
      var cards = ss.containerEl.querySelectorAll('.tool-card');
      if (cards.length > 0) {
        var lastCard = cards[cards.length - 1];
        var resultPre = lastCard.querySelector('.tool-result pre');
        if (resultPre) {
          resultPre.textContent = result;
          resultPre.style.opacity = '1';
          resultPre.className = lastTc ? (lastTc.error ? 'error' : 'success') : 'success';
        }
      }
      ss.lastType = 'tool_call';
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }
  }

  function finishStream(sessionId, response, error) {
    var ss = getStreamState(sessionId);
    var idx = ss.msgIdx;
    var wasVisible = isSessionVisible(sessionId);
    ss.streaming = false;
    ss.msgIdx = -1;
    ss.containerEl = null;
    ss.lastType = '';
    ss.lastEl = null;
    // 清除超时计时器
    if (streamTimers[sessionId]) { clearTimeout(streamTimers[sessionId]); delete streamTimers[sessionId]; }

    var s = getSessionById(sessionId);
    if (!s) return;

    var lastMsg = s.messages[s.messages.length - 1];
    if (lastMsg && lastMsg.role === 'assistant') {
      lastMsg._done = true;
      if (response !== undefined && response !== null) lastMsg.content = response;
    }
    if (error) {
      s.messages.push({ role: 'assistant', content: '❌ ' + error, reasoning: '', toolCalls: [], segments: [], _done: true });
    }

    if (wasVisible) {
      var msgEl = document.getElementById('msg-' + idx);
      if (msgEl && lastMsg && !error) {
        var bubbles = msgEl.querySelectorAll('.bubble');
        for (var b = 0; b < bubbles.length; b++) {
          var segIdx = -1;
          var segCount = 0;
          for (var si = 0; si < lastMsg.segments.length; si++) {
            if (lastMsg.segments[si].type === 'text') {
              if (segCount === b) { segIdx = si; break; }
              segCount++;
            }
          }
          if (segIdx >= 0) bubbles[b].innerHTML = renderMarkdown(lastMsg.segments[segIdx].content);
        }
        var reasonings = msgEl.querySelectorAll('.reasoning-content');
        for (var r = 0; r < reasonings.length; r++) {
          reasonings[r].innerHTML = escHtmlBr(reasonings[r].textContent);
        }
        msgEl.classList.remove('streaming');
      } else {
        renderMessages();
      }
    }

    s.messageCount = s.messages.length;
    var firstUser = null;
    for (var i = 0; i < s.messages.length; i++) {
      if (s.messages[i].role === 'user') { firstUser = s.messages[i]; break; }
    }
    s.preview = firstUser ? firstUser.content.slice(0, 50) : '';
    if (s.preview) s.name = s.preview.slice(0, 30);
    renderSessions();
    updateSendButton();
  }

  // 取消指定 session 的流式输出（发送 cancel 消息，不断开 WebSocket）
  function stopSessionStreaming(sessionId) {
    var s = getSessionById(sessionId);
    if (!s || !s.serverSessionId) return;
    sendWS({ type: 'cancel', session_id: s.serverSessionId });
  }

  window.stopStreaming = function() {
    var s = getActiveSession();
    if (!s) return;
    var ss = streamStates[s.id];
    if (ss && ss.streaming) {
      stopSessionStreaming(s.id);
      // 本地立即标记结束（服务端取消后还会发 error 消息）
      finishStream(s.id, null, '用户停止生成');
    }
  };

  function updateSendButton() {
    var sendBtn = document.getElementById('send-btn');
    var stopBtn = document.getElementById('stop-btn');
    var streaming = isActiveStreaming();
    if (streaming) {
      sendBtn.style.display = 'none';
      stopBtn.style.display = 'block';
    } else {
      sendBtn.style.display = 'block';
      stopBtn.style.display = 'none';
    }
    sendBtn.disabled = streaming;
  }

  // ========== QUESTION MODAL (ask_user_question) ==========
  var questionState = null; // { sessionId, questions, currentIdx, answers, customText }

  function showQuestionModal(sessionId, questions) {
    // 初始化状态
    questionState = {
      sessionId: sessionId,
      questions: questions,
      currentIdx: 0,
      answers: {},
      customText: {} // question text -> custom text
    };

    var overlay = document.getElementById('question-overlay');
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.id = 'question-overlay';
      overlay.className = 'question-overlay';
      document.body.appendChild(overlay);
    }
    renderQuestion(overlay);
  }

  function closeQuestionModal() {
    var overlay = document.getElementById('question-overlay');
    if (overlay) overlay.remove();
    questionState = null;
  }

  function renderQuestion(overlay) {
    var qs = questionState;
    var q = qs.questions[qs.currentIdx];
    var isLast = qs.currentIdx >= qs.questions.length - 1;

    // 构建进度点
    var progressHtml = '';
    for (var i = 0; i < qs.questions.length; i++) {
      var dotCls = 'q-progress-dot';
      if (i === qs.currentIdx) dotCls += ' active';
      else if (qs.answers[qs.questions[i].question]) dotCls += ' answered';
      if (qs.questions.length > 1) {
        progressHtml += '<span class="' + dotCls + '" onclick="navigateToQuestion(' + i + ')" title="第' + (i+1) + '题"></span>';
      }
    }

    // 构建选项列表
    var optionsHtml = '';
    var selectedValue = qs.answers[q.question] || '';
    var selectedList = selectedValue ? selectedValue.split(', ') : [];
    var isMulti = q.multi_select;
    var isOtherSelected = selectedList.indexOf('__other__') >= 0;

    for (var j = 0; j < q.options.length; j++) {
      var opt = q.options[j];
      var isSelected = selectedList.indexOf(opt.label) >= 0;
      var cardCls = 'option-card';
      if (isSelected) cardCls += ' selected';
      var indicatorHtml;
      if (isMulti) {
        indicatorHtml = '<div class="opt-check">' + (isSelected ? '✓' : '') + '</div>';
      } else {
        indicatorHtml = '<div class="opt-radio"></div>';
      }
      optionsHtml +=
        '<div class="' + cardCls + '" onclick="selectOption(' + j + ', this)">' +
        indicatorHtml +
        '<div class="opt-body">' +
        '<div class="opt-label">' + escHtml(opt.label) + '</div>' +
        '<div class="opt-desc">' + escHtml(opt.description) + '</div>' +
        '</div></div>';
    }

    // "Other" 选项（自动追加）
    var otherCardCls = 'option-card other-option';
    if (isOtherSelected) otherCardCls += ' selected';
    optionsHtml +=
      '<div class="' + otherCardCls + '" onclick="selectOtherOption(this)">' +
      (isMulti
        ? '<div class="opt-check">' + (isOtherSelected ? '✓' : '') + '</div>'
        : '<div class="opt-radio"></div>') +
      '<div class="opt-body">' +
      '<div class="opt-label">✏️ 自定义答案</div>' +
      '<div class="opt-desc">输入你自己的答案</div>' +
      '<div class="custom-input-wrap' + (isOtherSelected ? ' visible' : '') + '">' +
      '<input type="text" placeholder="输入自定义答案..." value="' + escHtml(qs.customText[q.question] || '') + '" ' +
      'oninput="updateCustomText(this.value)" onclick="event.stopPropagation()" onkeydown="if(event.key===\'Enter\'){event.preventDefault();goNextOrSubmit()}">' +
      '</div>' +
      '</div></div>';

    var typeHint = isMulti ? '（可多选）' : '（单选）';

    var navHtml = '';
    if (qs.questions.length > 1) {
      navHtml += '<button class="btn-back" onclick="navigateQuestion(-1)"' + (qs.currentIdx === 0 ? ' style="visibility:hidden"' : '') + '>← 上一题</button>';
    }
    if (isLast) {
      navHtml += '<button class="btn-submit" onclick="submitQuestionAnswers()" id="q-submit-btn">提交答案 ✓</button>';
    } else {
      navHtml += '<button class="btn-next" onclick="goNextOrSubmit()">下一题 →</button>';
    }

    overlay.innerHTML =
      '<div class="question-modal">' +
      '<h2><span class="q-icon">📋</span> 需要你的选择</h2>' +
      '<div class="q-subtitle">Agent 正在等待你的回答...</div>' +
      (qs.questions.length > 1 ? '<div class="q-progress">' + progressHtml + '</div>' : '') +
      '<div class="q-block">' +
      '<span class="q-header">' + escHtml(q.header) + '</span>' +
      '<div class="q-text">' + escHtml(q.question) + '</div>' +
      '<div class="q-type-hint">' + typeHint + '</div>' +
      optionsHtml +
      '</div>' +
      '<div class="q-navigation">' + navHtml + '</div>' +
      '</div>';

    // 聚焦自定义答案输入（如果已选中 Other）
    if (isOtherSelected) {
      setTimeout(function() {
        var input = overlay.querySelector('.custom-input-wrap.visible input');
        if (input) input.focus();
      }, 100);
    }
  }

  window.selectOption = function(idx, cardEl) {
    var qs = questionState;
    if (!qs) return;
    var q = qs.questions[qs.currentIdx];
    var opt = q.options[idx];

    if (q.multi_select) {
      // 多选模式：toggle
      var selected = qs.answers[q.question] || '';
      var selectedList = selected ? selected.split(', ') : [];
      var pos = selectedList.indexOf(opt.label);
      if (pos >= 0) {
        selectedList.splice(pos, 1);
      } else {
        // 如果之前选了 Other，取消 Other
        var otherPos = selectedList.indexOf('__other__');
        if (otherPos >= 0) selectedList.splice(otherPos, 1);
        selectedList.push(opt.label);
      }
      qs.answers[q.question] = selectedList.join(', ');
    } else {
      // 单选模式
      qs.answers[q.question] = opt.label;
    }

    // 清除 Other 的自定义文本（单选模式，且不是 Other）
    delete qs.customText[q.question];

    renderQuestion(document.getElementById('question-overlay'));
  };

  window.selectOtherOption = function(cardEl) {
    var qs = questionState;
    if (!qs) return;
    var q = qs.questions[qs.currentIdx];

    if (q.multi_select) {
      var selected = qs.answers[q.question] || '';
      var selectedList = selected ? selected.split(', ') : [];
      var pos = selectedList.indexOf('__other__');
      if (pos >= 0) {
        selectedList.splice(pos, 1);
        delete qs.customText[q.question];
      } else {
        selectedList.push('__other__');
      }
      qs.answers[q.question] = selectedList.join(', ');
    } else {
      if (qs.answers[q.question] === '__other__') {
        delete qs.answers[q.question];
      } else {
        qs.answers[q.question] = '__other__';
      }
    }

    renderQuestion(document.getElementById('question-overlay'));
  };

  window.updateCustomText = function(text) {
    var qs = questionState;
    if (!qs) return;
    var q = qs.questions[qs.currentIdx];
    qs.customText[q.question] = text;
  };

  window.navigateToQuestion = function(idx) {
    if (!questionState) return;
    questionState.currentIdx = idx;
    renderQuestion(document.getElementById('question-overlay'));
  };

  window.navigateQuestion = function(delta) {
    if (!questionState) return;
    var newIdx = questionState.currentIdx + delta;
    if (newIdx >= 0 && newIdx < questionState.questions.length) {
      questionState.currentIdx = newIdx;
      renderQuestion(document.getElementById('question-overlay'));
    }
  };

  window.goNextOrSubmit = function() {
    if (!questionState) return;
    if (questionState.currentIdx < questionState.questions.length - 1) {
      navigateQuestion(1);
    } else {
      submitQuestionAnswers();
    }
  };

  window.submitQuestionAnswers = function() {
    var qs = questionState;
    if (!qs) return;

    // 构建最终答案
    var finalAnswers = {};
    for (var i = 0; i < qs.questions.length; i++) {
      var q = qs.questions[i];
      var answer = qs.answers[q.question] || '';

      // 将 __other__ 替换为自定义文本
      if (q.multi_select) {
        var parts = answer ? answer.split(', ') : [];
        var finalParts = [];
        for (var p = 0; p < parts.length; p++) {
          if (parts[p] === '__other__') {
            var customText = qs.customText[q.question] || '';
            if (customText) finalParts.push(customText);
          } else {
            finalParts.push(parts[p]);
          }
        }
        finalAnswers[q.question] = finalParts.join(', ');
      } else {
        if (answer === '__other__') {
          finalAnswers[q.question] = qs.customText[q.question] || '(自定义答案)';
        } else {
          finalAnswers[q.question] = answer;
        }
      }

      // 如果没有任何答案，标记为未回答
      if (!finalAnswers[q.question]) {
        finalAnswers[q.question] = '(未回答)';
      }
    }

    // 发送答案到服务端
    var s = getSessionById(qs.sessionId);
    var serverSid = (s && s.serverSessionId) ? s.serverSessionId : '';
    sendWS({ type: 'answer_question', session_id: serverSid, answers: finalAnswers });

    // 关闭模态框
    closeQuestionModal();
  }

  // ========== USER INPUT ==========

  // 发送指定 session 的待发送消息队列
  function flushPendingMessages(frontendSessionId) {
    var queue = pendingMessages[frontendSessionId];
    if (!queue || queue.length === 0) return;
    var target = getSessionById(frontendSessionId);
    if (!target || !target.serverSessionId) return;
    for (var i = 0; i < queue.length; i++) {
      sendWS({ type: 'chat', content: queue[i].content, session_id: target.serverSessionId });
    }
    delete pendingMessages[frontendSessionId];
  }

  window.onInputKey = function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
      return false;
    }
    return true;
  };

  window.sendMessage = function() {
    var input = document.getElementById('input');
    var text = input.value.trim();
    if (!text) return;

    // 检查当前活跃 session 是否正在 streaming
    if (isActiveStreaming()) return;

    input.value = '';
    input.style.height = 'auto';

    if (!state.activeSessionId) {
      createSession();
    }

    var s = getActiveSession();
    if (!s) return;
    s.messages.push({ role: 'user', content: text, reasoning: '', toolCalls: [] });
    s.messageCount = s.messages.length;
    s.preview = text.slice(0, 50);
    s.name = text.slice(0, 30);

    // 初始化该 session 的流式状态
    var ss = getStreamState(s.id);
    ss.streaming = true;

    // 启动 streaming 超时计时器，防止状态卡死
    if (streamTimers[s.id]) clearTimeout(streamTimers[s.id]);
    streamTimers[s.id] = setTimeout(function() {
      var ss2 = getStreamState(s.id);
      if (ss2.streaming) {
        console.warn('Streaming timeout, auto-reset for session:', s.id);
        finishStream(s.id, null, '响应超时，请重试');
      }
    }, STREAM_TIMEOUT_MS);

    renderMessages();
    renderSessions();
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    updateSendButton();

    ensureConnected();
    var sendSessionId = s.id;
    var target = getSessionById(sendSessionId);
    var sid = (target && target.serverSessionId) ? target.serverSessionId : '';
    // 即使 serverSessionId 尚未就绪也直接发送：
    // - 有 serverSessionId → 精确路由
    // - 无 serverSessionId → 发空值，后端用 activeSessionID 路由（new_session 已先处理）
    // - 后端响应带 server session_id → streaming fallback 自动绑定
    sendWS({ type: 'chat', content: text, session_id: sid });
  };

  // ========== STATUS ==========
  function setStatus(status) {
    var dot = document.getElementById('status-dot');
    var text = document.getElementById('status-text');
    dot.className = 'dot';
    if (status === 'connected') { text.textContent = '已连接'; }
    else if (status === 'connecting') { dot.classList.add('connecting'); text.textContent = '连接中...'; }
    else { dot.classList.add('disconnected'); text.textContent = '未连接'; }
  }

  // ========== CONFIG ==========
  // LLM 配置状态（从 localStorage 加载）
  var llmState = {
    provider: localStorage.getItem('lite_agent_provider') || '',
    apiKey: '',
    baseUrl: localStorage.getItem('lite_agent_base_url') || '',
    model: localStorage.getItem('lite_agent_model') || ''
  };

  window.showConfig = function() {
    document.getElementById('cfg-url').value = state.serverUrl;
    document.getElementById('cfg-provider').value = llmState.provider || 'custom';
    document.getElementById('cfg-base-url').value = llmState.baseUrl;
    document.getElementById('cfg-api-key').value = llmState.apiKey;
    document.getElementById('cfg-model').value = llmState.model;
    document.getElementById('config-modal').style.display = 'flex';

    // Telegram: 恢复已保存的 Token 并同步 UI
    var savedTgToken = localStorage.getItem('lite_agent_tg_token');
    if (savedTgToken && !tgState.token) tgState.token = savedTgToken;
    document.getElementById('cfg-tg-token').value = tgState.token;
    updateTgStatusUI();

    // 首次打开且已连接时，尝试从服务端获取当前配置
    if (!llmState.baseUrl && state.ws && state.ws.readyState === WebSocket.OPEN) {
      sendWS({ type: 'get_llm_config' });
    }
    if (state.ws && state.ws.readyState === WebSocket.OPEN) {
      sendWS({ type: 'get_telegram_config' });
    }
  };
  window.closeConfig = function() { document.getElementById('config-modal').style.display = 'none'; };

  window.onProviderChange = function() {
    var p = document.getElementById('cfg-provider').value;
    var preset = LLM_PROVIDERS[p];
    if (preset) {
      document.getElementById('cfg-base-url').value = preset.base_url;
      document.getElementById('cfg-model').value = preset.model;
    }
    // custom 不清空，保留用户输入
  };

  window.saveConfig = function() {
    var oldUrl = state.serverUrl;
    state.serverUrl = document.getElementById('cfg-url').value.trim();
    localStorage.setItem('lite_agent_url', state.serverUrl);

    // 保存 LLM 配置
    llmState.provider = document.getElementById('cfg-provider').value;
    llmState.baseUrl = document.getElementById('cfg-base-url').value.trim();
    llmState.apiKey = document.getElementById('cfg-api-key').value.trim();
    llmState.model = document.getElementById('cfg-model').value.trim();
    localStorage.setItem('lite_agent_provider', llmState.provider);
    localStorage.setItem('lite_agent_base_url', llmState.baseUrl);
    localStorage.setItem('lite_agent_model', llmState.model);

    // 保存 Telegram Token
    var tgToken = document.getElementById('cfg-tg-token').value.trim();
    tgState.token = tgToken;
    localStorage.setItem('lite_agent_tg_token', tgToken);

    closeConfig();

    // 如果 WebSocket 地址变了，重连
    if (state.serverUrl !== oldUrl) {
      reconnectAttempts = 0;
      connecting = false;
      if (state.ws) { try { state.ws.close(); } catch(e) {} state.ws = null; }
      connect();
    }

    // 发送 LLM 配置到服务端（连接后会自动发送，如果已连接则立即发送）
    sendLLMConfig();
  };

  function sendLLMConfig() {
    if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
    if (!llmState.baseUrl && !llmState.apiKey && !llmState.model) return;
    sendWS({
      type: 'set_llm_config',
      llm_config: {
        provider: llmState.provider,
        api_key: llmState.apiKey,
        base_url: llmState.baseUrl,
        model: llmState.model
      }
    });
  }

  // 如果配置弹窗打开，同步更新其中的值
  function updateConfigModalIfOpen() {
    var modal = document.getElementById('config-modal');
    if (modal.style.display === 'flex') {
      document.getElementById('cfg-base-url').value = llmState.baseUrl || '';
      document.getElementById('cfg-model').value = llmState.model || '';
      document.getElementById('cfg-provider').value = llmState.provider || 'custom';
      // 同步 Telegram UI
      updateTgStatusUI();
    }
  }

  // ========== TELEGRAM BOT ==========
  function updateTgStatusUI() {
    var tokenInput = document.getElementById('cfg-tg-token');
    var statusEl = document.getElementById('tg-status');
    var statusText = document.getElementById('tg-status-text');
    var startBtn = document.getElementById('tg-start-btn');
    var stopBtn = document.getElementById('tg-stop-btn');

    // Token 输入
    if (tgState.token && tokenInput.value === '') {
      tokenInput.value = tgState.token;
    }

    // 状态显示
    statusEl.style.display = 'flex';
    statusEl.className = 'telegram-status ' + tgState.status;
    if (tgState.status === 'running') {
      statusText.textContent = tgState.username ? '运行中 @' + tgState.username : '运行中';
      startBtn.disabled = true;
      stopBtn.disabled = false;
    } else if (tgState.status === 'error') {
      statusText.textContent = '错误: ' + (tgState.error || '未知错误');
      startBtn.disabled = false;
      stopBtn.disabled = true;
    } else {
      statusText.textContent = '已停止';
      startBtn.disabled = false;
      stopBtn.disabled = true;
    }
  }

  window.toggleTgToken = function() {
    var input = document.getElementById('cfg-tg-token');
    if (input.type === 'password') {
      input.type = 'text';
      event.target.textContent = '🙈 隐藏';
    } else {
      input.type = 'password';
      event.target.textContent = '👁 显示';
    }
  };

  window.startTelegramBot = function() {
    var tokenInput = document.getElementById('cfg-tg-token');
    var token = tokenInput.value.trim();
    if (!token) {
      toast('请先输入 Telegram Bot Token', 'error');
      return;
    }

    // 保存 Token
    tgState.token = token;
    localStorage.setItem('lite_agent_tg_token', token);

    // 先设置 Token 到服务端
    sendWS({
      type: 'set_telegram_config',
      telegram_config: { token: token, status: 'stopped', username: '', error: '' }
    });

    // 然后启动
    sendWS({ type: 'start_telegram_bot' });

    // 更新 UI
    tgState.status = 'running';
    tgState.error = '';
    updateTgStatusUI();
    toast('正在启动 Telegram Bot...', 'success');
  };

  window.stopTelegramBot = function() {
    sendWS({ type: 'stop_telegram_bot' });
    tgState.status = 'stopped';
    updateTgStatusUI();
    toast('Telegram Bot 已停止', 'success');
  };

  // 请求 Telegram Bot 当前状态（连接建立后调用）
  function requestTelegramConfig() {
    sendWS({ type: 'get_telegram_config' });
  }

  // ========== TOAST ==========
  function toast(msg, type) {
    var el = document.createElement('div');
    el.className = 'toast ' + (type || '');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 3000);
  }

  // ========== INIT ==========
  document.addEventListener('DOMContentLoaded', function() {
    try {
      var saved = localStorage.getItem('lite_agent_sessions');
      if (saved) {
        state.sessions = JSON.parse(saved);
        for (var i = 0; i < state.sessions.length; i++) {
          if (!state.sessions[i].messages) state.sessions[i].messages = [];
        }
      }
    } catch(e) {}
    if (state.sessions.length > 0) {
      state.activeSessionId = state.sessions[0].id;
    }
    renderSessions();
    renderMessages();

    if (!localStorage.getItem('lite_agent_url') && !localStorage.getItem('lite_agent_base_url')) {
      showConfig();
    }

    connect();

    var input = document.getElementById('input');
    input.addEventListener('input', function() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
    });

    setInterval(function() {
      var local = [];
      for (var i = 0; i < state.sessions.length; i++) {
        local.push({
          id: state.sessions[i].id,
          name: state.sessions[i].name,
          createdAt: state.sessions[i].createdAt,
          messageCount: state.sessions[i].messageCount,
          preview: state.sessions[i].preview,
          serverSessionId: state.sessions[i].serverSessionId
        });
      }
      localStorage.setItem('lite_agent_sessions', JSON.stringify(local));
    }, 2000);

    var header = document.querySelector('.sidebar-header');
    header.style.cursor = 'pointer';
    header.addEventListener('dblclick', showConfig);
  });

})();
</script>
</body>
