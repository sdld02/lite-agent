<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lite Agent - 控制面板</title>
<style>
:root {
  --bg: #0f1117;
  --sidebar-bg: #161822;
  --surface: #1c1f2e;
  --surface-hover: #252836;
  --border: #2a2d3a;
  --text: #e1e4ed;
  --text-secondary: #8b8fa3;
  --text-muted: #5c6078;
  --accent: #6c8cff;
  --accent-dim: rgba(108,140,255,0.15);
  --success: #4ade80;
  --error: #f87171;
  --warning: #fbbf24;
  --reasoning: #7c8aa0;
  --tool-bg: #1a1d2e;
  --tool-border: #2e3350;
  --radius: 10px;
  --radius-sm: 6px;
  --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; font-family:var(--font-sans); background:var(--bg); color:var(--text); overflow:hidden; }
#app { display:flex; height:100%; }

#sidebar {
  width:280px; min-width:280px; background:var(--sidebar-bg);
  display:flex; flex-direction:column; border-right:1px solid var(--border);
}
.sidebar-header {
  padding:18px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header h1 { font-size:16px; font-weight:700; letter-spacing:-0.3px; }
.sidebar-header .logo { display:flex; align-items:center; gap:8px; }
.sidebar-header .logo .dot { width:8px; height:8px; border-radius:50%; background:var(--success); }
.sidebar-header .logo .dot.disconnected { background:var(--error); }
.sidebar-header .logo .dot.connecting { background:var(--warning); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.status-bar { padding:10px 16px; font-size:11px; color:var(--text-muted); border-bottom:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center; }
.status-bar .addr { font-family:var(--font-mono); }

.session-actions { padding:10px 12px; }
.session-actions button {
  width:100%; padding:10px; border:1px dashed var(--border); background:transparent;
  color:var(--text-secondary); border-radius:var(--radius-sm); cursor:pointer;
  font-size:13px; display:flex; align-items:center; justify-content:center; gap:6px;
  transition: all 0.2s;
}
.session-actions button:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

#session-list { flex:1; overflow-y:auto; padding:0 8px 8px; }
.session-item {
  padding:10px 12px; margin:2px 0; border-radius:var(--radius-sm); cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; transition:all 0.15s;
  font-size:13px; border:1px solid transparent;
}
.session-item:hover { background:var(--surface-hover); }
.session-item.active { background:var(--accent-dim); border-color:var(--accent); }
.session-item .info { flex:1; min-width:0; }
.session-item .name { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
.session-item .meta { font-size:11px; color:var(--text-muted); margin-top:2px; }
.session-item .delete-btn {
  opacity:0; background:none; border:none; color:var(--error); cursor:pointer;
  font-size:14px; padding:2px 6px; border-radius:4px; transition:opacity 0.2s;
}
.session-item:hover .delete-btn { opacity:1; }
.session-item .delete-btn:hover { background:rgba(248,113,113,0.15); }

#main { flex:1; display:flex; flex-direction:column; min-width:0; }

#toolbar {
  padding:12px 20px; border-bottom:1px solid var(--border); display:flex;
  align-items:center; justify-content:space-between; background:var(--surface);
  flex-shrink:0;
}
#toolbar .session-title { font-weight:600; font-size:15px; }
#toolbar .actions { display:flex; gap:8px; }
#toolbar .actions button {
  padding:6px 14px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:transparent; color:var(--text-secondary); cursor:pointer; font-size:12px;
  transition:all 0.2s;
}
#toolbar .actions button:hover { border-color:var(--accent); color:var(--accent); }
#toolbar .actions button.danger:hover { border-color:var(--error); color:var(--error); }

#messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }

.msg { display:flex; flex-direction:column; max-width:85%; animation:slideIn 0.2s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-self:flex-end; }
.msg.assistant { align-self:flex-start; }
.msg .bubble {
  padding:12px 16px; border-radius:var(--radius); line-height:1.6; font-size:14px; word-break:break-word;
}
.msg.user .bubble { background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
.msg.assistant .bubble { background:var(--surface); border:1px solid var(--border); border-bottom-left-radius:4px; }
.msg .bubble pre {
  background:#0d1117; border-radius:var(--radius-sm); padding:12px; overflow-x:auto;
  font-family:var(--font-mono); font-size:13px; margin:8px 0; border:1px solid var(--border);
}
.msg .bubble code { font-family:var(--font-mono); font-size:13px; }
.msg .bubble p { margin:4px 0; }
.msg .bubble ul, .msg .bubble ol { margin:4px 0; padding-left:20px; }
.msg .bubble blockquote { border-left:3px solid var(--accent); padding-left:12px; color:var(--text-secondary); margin:8px 0; }

.reasoning-block {
  margin-bottom:8px; padding:10px 14px; background:rgba(124,138,160,0.08);
  border-left:2px solid var(--reasoning); border-radius:0 var(--radius-sm) var(--radius-sm) 0;
  font-size:13px; color:var(--reasoning); font-style:italic;
}
.reasoning-block summary { cursor:pointer; font-weight:500; margin-bottom:4px; }
.reasoning-block summary:hover { color:var(--text-secondary); }

.tool-card {
  margin:8px 0; background:var(--tool-bg); border:1px solid var(--tool-border);
  border-radius:var(--radius-sm); overflow:hidden; font-size:13px;
}
.tool-card-header {
  padding:8px 12px; display:flex; align-items:center; gap:8px; cursor:pointer;
  background:rgba(108,140,255,0.06); user-select:none;
}
.tool-card-header .tool-icon { font-size:15px; flex-shrink:0; }
.tool-card-header .tool-info { flex:1; min-width:0; display:flex; flex-wrap:wrap; align-items:baseline; gap:0 6px; }
.tool-card-header .tool-name { font-weight:600; color:var(--accent); font-size:13px; white-space:nowrap; }
.tool-card-header .tool-intent { color:var(--text-secondary); font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tool-card-header .tool-arrow { flex-shrink:0; transition:transform 0.2s; color:var(--text-muted); }
.tool-card.open .tool-card-header .tool-arrow { transform:rotate(180deg); }
.tool-card-body { display:none; padding:10px 12px; }
.tool-card.open .tool-card-body { display:block; }
.tool-card-body pre {
  background:#0d1117; padding:10px; border-radius:var(--radius-sm); overflow-x:auto;
  font-family:var(--font-mono); font-size:12px; border:1px solid var(--border); max-height:300px;
}
.tool-result { margin-top:4px; }
.tool-result-label { font-size:11px; color:var(--text-muted); margin-bottom:4px; }
.tool-result .success { color:var(--success); }
.tool-result .error { color:var(--error); }

.streaming-cursor::after { content:' ▌'; animation:blink 0.8s infinite; color:var(--accent); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.spinner-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
.msg.streaming .bubble { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent-dim); }

#input-area { padding:12px 20px; border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.input-row { display:flex; gap:10px; align-items:flex-end; }
#input {
  flex:1; padding:12px 16px; border-radius:var(--radius); border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:14px; font-family:var(--font-sans);
  resize:none; min-height:44px; max-height:160px; outline:none; transition:border-color 0.2s;
  line-height:1.4;
}
#input:focus { border-color:var(--accent); }
#input::placeholder { color:var(--text-muted); }
#send-btn {
  padding:12px 22px; background:var(--accent); color:#fff; border:none;
  border-radius:var(--radius); cursor:pointer; font-size:14px; font-weight:600;
  transition:all 0.2s; white-space:nowrap;
}
#send-btn:hover { filter:brightness(1.15); }
#send-btn:disabled { opacity:0.4; cursor:not-allowed; }
#stop-btn { padding:12px 16px; background:var(--surface); color:var(--error); border:1px solid var(--error);
  border-radius:var(--radius); cursor:pointer; font-size:14px; display:none; }

.toast {
  position:fixed; top:20px; right:20px; padding:12px 20px; border-radius:var(--radius-sm);
  font-size:13px; z-index:999; animation:slideIn 0.3s ease;
  background:var(--surface); border:1px solid var(--border); color:var(--text);
}
.toast.error { border-color:var(--error); }
.toast.success { border-color:var(--success); }

.welcome { display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; color:var(--text-muted); gap:12px; }
.welcome .icon { font-size:48px; }
.welcome h2 { font-weight:600; font-size:18px; color:var(--text-secondary); }
.welcome p { font-size:13px; max-width:400px; text-align:center; line-height:1.6; }
.welcome .hints { margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.welcome .hint {
  padding:6px 12px; border-radius:20px; border:1px solid var(--border); font-size:12px;
  cursor:pointer; transition:all 0.2s;
}
.welcome .hint:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100%; color:var(--text-muted); gap:8px; font-size:13px; }

.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100;
  display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:24px; width:420px; max-width:90vw;
}
.modal h3 { margin-bottom:16px; font-size:16px; }
.modal label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:4px; margin-top:12px; }
.modal input {
  width:100%; padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:14px; outline:none;
}
.modal input:focus { border-color:var(--accent); }
.modal-buttons { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
.modal-buttons button {
  padding:8px 20px; border-radius:var(--radius-sm); font-size:13px; cursor:pointer;
}
.modal-buttons .primary { background:var(--accent); color:#fff; border:none; }
.modal-buttons .secondary { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }


#task-panel {
  border-top: 2px solid var(--border);
  max-height: 35%;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.task-panel-header {
  padding: 10px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.task-panel-header .task-count {
  font-size: 10px;
  color: var(--text-muted);
  background: var(--surface);
  padding: 2px 8px;
  border-radius: 10px;
}
#task-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 8px 8px;
  min-height: 0;
}
.task-item {
  padding: 6px 10px;
  margin: 1px 0;
  border-radius: var(--radius-sm);
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  cursor: default;
}
.task-item:hover {
  background: var(--surface-hover);
}
.task-status-icon {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.task-status-icon.pending {
  background: var(--text-muted);
}
.task-status-icon.in_progress {
  background: var(--warning);
  animation: pulse 1.5s infinite;
}
.task-status-icon.completed {
  background: var(--success);
}
.task-item .task-info {
  flex: 1;
  min-width: 0;
}
.task-item .task-subject {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-secondary);
}
.task-item.completed .task-subject {
  text-decoration: line-through;
  color: var(--text-muted);
}
.task-item .task-id {
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
}
@media (max-width:768px) {
  #sidebar { width:240px; min-width:240px; }
  .msg { max-width:92%; }
}

/* ====== Telegram Bot 配置样式 ====== */
.telegram-section { margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
.telegram-section .section-title { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.telegram-status { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:var(--radius-sm); font-size:12px; margin-top:8px; }
.telegram-status.running { background:rgba(74,222,128,0.1); color:var(--success); border:1px solid rgba(74,222,128,0.2); }
.telegram-status.stopped { background:rgba(139,143,163,0.08); color:var(--text-muted); border:1px solid var(--border); }
.telegram-status.error { background:rgba(248,113,113,0.1); color:var(--error); border:1px solid rgba(248,113,113,0.2); }
.telegram-status .status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.telegram-status.running .status-dot { background:var(--success); animation:pulse 1.5s infinite; }
.telegram-status.stopped .status-dot { background:var(--text-muted); }
.telegram-status.error .status-dot { background:var(--error); }
.telegram-actions { display:flex; gap:8px; margin-top:8px; }
.telegram-actions button { padding:6px 14px; border-radius:var(--radius-sm); font-size:12px; cursor:pointer; border:1px solid var(--border); transition:all 0.2s; }
.telegram-actions .tg-start { background:var(--success); color:#000; border-color:var(--success); }
.telegram-actions .tg-start:hover { filter:brightness(1.15); }
.telegram-actions .tg-stop { background:transparent; color:var(--error); border-color:var(--error); }
.telegram-actions .tg-stop:hover { background:rgba(248,113,113,0.1); }
.telegram-actions .tg-start:disabled, .telegram-actions .tg-stop:disabled { opacity:0.4; cursor:not-allowed; }

/* ====== Ask User Question 提问卡片样式 ====== */
.question-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200;
  display:flex; align-items:center; justify-content:center; animation:fadeIn 0.2s ease;
  backdrop-filter:blur(4px);
}
.question-modal {
  background:var(--surface); border:1px solid var(--border); border-radius:16px;
  padding:28px 32px; width:560px; max-width:92vw; max-height:85vh;
  overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.question-modal h2 {
  font-size:20px; font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:10px;
}
.question-modal h2 .q-icon { font-size:24px; }
.question-modal .q-subtitle {
  font-size:12px; color:var(--text-muted); margin-bottom:8px;
}
.question-modal .q-progress {
  display:flex; gap:6px; margin-bottom:20px; flex-wrap:wrap;
}
.question-modal .q-progress-dot {
  width:10px; height:10px; border-radius:50%; background:var(--border);
  transition:all 0.3s; cursor:pointer;
}
.question-modal .q-progress-dot.active { background:var(--accent); transform:scale(1.3); }
.question-modal .q-progress-dot.answered { background:var(--success); }

.q-block { margin-bottom:24px; animation:slideIn 0.25s ease; }
.q-block .q-header {
  display:inline-block; padding:3px 10px; border-radius:12px; background:var(--accent-dim);
  color:var(--accent); font-size:11px; font-weight:600; text-transform:uppercase;
  letter-spacing:0.5px; margin-bottom:8px;
}
.q-block .q-text { font-size:15px; font-weight:500; margin-bottom:14px; line-height:1.5; color:var(--text); }
.q-block .q-type-hint {
  font-size:11px; color:var(--text-muted); margin-bottom:8px;
}

.option-card {
  display:flex; align-items:flex-start; gap:12px;
  padding:12px 14px; margin-bottom:8px; border-radius:var(--radius);
  border:1.5px solid var(--border); cursor:pointer; transition:all 0.2s;
  background:var(--bg);
}
.option-card:hover { border-color:var(--accent); background:rgba(108,140,255,0.06); }
.option-card.selected {
  border-color:var(--accent); background:rgba(108,140,255,0.12);
  box-shadow:0 0 0 1px var(--accent);
}
.option-card .opt-radio {
  width:20px; height:20px; border-radius:50%; border:2px solid var(--border);
  flex-shrink:0; margin-top:1px; transition:all 0.2s; display:flex;
  align-items:center; justify-content:center;
}
.option-card.selected .opt-radio {
  border-color:var(--accent); background:var(--accent);
}
.option-card.selected .opt-radio::after {
  content:''; width:6px; height:6px; border-radius:50%; background:#fff;
}
.option-card .opt-check {
  width:20px; height:20px; border-radius:4px; border:2px solid var(--border);
  flex-shrink:0; margin-top:1px; transition:all 0.2s; display:flex;
  align-items:center; justify-content:center; font-size:12px; color:#fff;
}
.option-card.selected .opt-check {
  border-color:var(--accent); background:var(--accent);
}
.option-card .opt-body { flex:1; min-width:0; }
.option-card .opt-label { font-weight:600; font-size:14px; color:var(--text); }
.option-card .opt-desc { font-size:12px; color:var(--text-secondary); margin-top:2px; line-height:1.4; }

.option-card.other-option {
  border-style:dashed; background:transparent;
}
.option-card.other-option:hover { border-color:var(--warning); background:rgba(251,191,36,0.04); }
.option-card.other-option.selected {
  border-color:var(--warning); background:rgba(251,191,36,0.08);
  box-shadow:0 0 0 1px var(--warning);
}

.custom-input-wrap {
  margin-top:6px; display:none; width:100%;
}
.custom-input-wrap.visible { display:block; }
.custom-input-wrap input {
  width:100%; padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:14px; outline:none; transition:border-color 0.2s;
}
.custom-input-wrap input:focus { border-color:var(--warning); }

.q-navigation {
  display:flex; gap:10px; justify-content:space-between; margin-top:20px; padding-top:16px;
  border-top:1px solid var(--border);
}
.q-navigation button {
  padding:10px 24px; border-radius:var(--radius-sm); font-size:14px; font-weight:600;
  cursor:pointer; transition:all 0.2s; border:none;
}
.q-navigation .btn-back {
  background:var(--surface-hover); color:var(--text-secondary);
}
.q-navigation .btn-back:hover { background:var(--border); }
.q-navigation .btn-next, .q-navigation .btn-submit {
  background:var(--accent); color:#fff; margin-left:auto;
}
.q-navigation .btn-next:hover, .q-navigation .btn-submit:hover { filter:brightness(1.15); }
.q-navigation .btn-next:disabled, .q-navigation .btn-submit:disabled {
  opacity:0.35; cursor:not-allowed;
}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="dot disconnected" id="status-dot"></span>
        <h1>Lite Agent</h1>
      </div>
    </div>
    <div class="status-bar">
      <span id="status-text">未连接</span>
      <span class="addr" id="server-addr">&mdash;</span>
    </div>
    <div class="session-actions">
      <button onclick="createSession()">＋ 新建任务</button>
    </div>
    <div id="session-list">
      <div class="empty-state">暂无任务</div>
    </div>
    <div id="task-panel">
      <div class="task-panel-header">
        <span>📋 子任务</span>
        <span class="task-count" id="task-count">0</span>
      </div>
      <div id="task-list">
        <div class="empty-state" style="font-size:11px;padding:16px 0;">暂无子任务</div>
      </div>
    </div>
  </div>

  <div id="main">
    <div id="toolbar">
      <span class="session-title" id="current-session-title">选择或创建一个任务</span>
      <div class="actions">
        <button onclick="showConfig()" title="配置大模型和连接" style="font-size:16px;">⚙️ 设置</button>
        <button onclick="clearSession()" title="清空当前对话">清空对话</button>
